function calcXP(sessions){
  let xp=0;
  sessions.forEach(s=>{
    xp+=50;
    xp+=Math.min(s.exercises.filter(e=>e.weight>0).length*8,60);
    if((s.duration||0)>=45)xp+=20;
    if((s.duration||0)>=60)xp+=15;
    if((s.duration||0)>=90)xp+=25;
    if((s.kcal||0)>=300)xp+=15;
  });
  return xp;
}
function getLevel(xp){
  for(let i=LEVELS.length-1;i>=0;i--) if(xp>=LEVELS[i].min) return{...LEVELS[i],idx:i};
  return{...LEVELS[0],idx:0};
}
function getLevelProgress(xp){
  const lv=getLevel(xp);
  if(lv.max===Infinity) return 1;
  return(xp-lv.min)/(lv.max-lv.min);
}
function getUnlockedBadges(sessions,records){
  return BADGES.filter(b=>b.check(records,sessions)).map(b=>b.id);

function get1RMHistory(exName,sessions){

    if(e) pts.push({date:s.date,orm:oneRM(e.weight,e.reps),weight:e.weight,reps:e.reps});

function getVolumeByMuscleByWeek(sessions){
  const weeks={};
  sessions.forEach(s=>{
    const d=new Date(s.date),day=d.getDay()||7;
    d.setDate(d.getDate()+1-day);
    const wk=d.toISOString().slice(0,10);
    if(!weeks[wk])weeks[wk]={};
    s.exercises.forEach(e=>{
      if(!weeks[wk][e.muscle])weeks[wk][e.muscle]=0;
      weeks[wk][e.muscle]+=(e.sets||1)*e.reps*e.weight;
    });
  });
  return Object.entries(weeks).sort((a,b)=>a[0].localeCompare(b[0])).slice(-8);
}
function predictPR(exName,targetKg,sessions){
  const hist=sessions.flatMap(s=>s.exercises.filter(e=>e.name===exName&&e.weight>0).map(e=>({date:s.date,w:e.weight})));
  if(hist.length<3)return null;
  const recent=hist.slice(-6);
  const avgGain=recent.slice(1).reduce((t,e,i)=>t+(e.w-recent[i].w),0)/(recent.length-1);
  if(avgGain<=0)return null;
  const last=recent[recent.length-1];
  const weeksNeeded=Math.ceil((targetKg-last.w)/avgGain);
  if(weeksNeeded<=0||weeksNeeded>52)return null;
  return weeksNeeded;
}


// ── ADVANCED ANALYTICS HELPERS ──
function calcFaticaIndex(sessions){
  // ATL (Acute Training Load) 7gg vs CTL (Chronic) 28gg → TSB (Training Stress Balance)
  const today=new Date();
  const vol7=[],vol28=[];
  for(let i=0;i<28;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const iso=d.toISOString().slice(0,10);
    const daySess=sessions.filter(s=>s.date===iso);
    const v=daySess.reduce((t,s)=>t+sessionVol(s),0);
    if(i<7)vol7.push(v);
    vol28.push(v);
  }
  const atl=vol7.reduce((a,b)=>a+b,0)/7;
  const ctl=vol28.reduce((a,b)=>a+b,0)/28;
  const tsb=ctl>0?Math.round((atl/ctl-1)*100):0; // positivo=overreaching, negativo=fresco
  return{atl:Math.round(atl),ctl:Math.round(ctl),tsb,status:tsb>40?"OVERREACHING":tsb>15?"CARICO ALTO":tsb>-10?"OTTIMALE":tsb>-25?"FRESCO":"DETRAINING"};
}
function getMonthlyStats(sessions,nutrEntries,tdeeEntries,actEntries){
  const months={};
  sessions.forEach(s=>{
    const m=s.date.slice(0,7);
    if(!months[m])months[m]={sessions:0,volume:0,duration:0,kcalBurned:0,prs:0};
    months[m].sessions++;
    months[m].volume+=sessionVol(s);
    months[m].duration+=s.duration||0;
    months[m].kcalBurned+=s.kcal||0;
  });
  // aggiungi kcal attività extra per mese
  Object.entries(actEntries||{}).forEach(([date,acts])=>{
    const m=date.slice(0,7);
    if(!months[m])months[m]={sessions:0,volume:0,duration:0,kcalBurned:0,prs:0};
    if(!months[m].actKcal)months[m].actKcal=0;
    if(!months[m].actMin)months[m].actMin=0;
    months[m].actKcal+=acts.reduce((t,a)=>t+(a.kcal||0),0);
    months[m].actMin+=acts.reduce((t,a)=>t+(a.min||0),0);
    months[m].kcalBurned+=acts.reduce((t,a)=>t+(a.kcal||0),0);
  });
  // aggiungi kcal nutrizione per mese
  Object.entries(nutrEntries||{}).forEach(([date,n])=>{
    const m=date.slice(0,7);
    if(!months[m])months[m]={sessions:0,volume:0,duration:0,kcalBurned:0,prs:0};
    if(!months[m].kcalIn)months[m].kcalIn=0;
    if(!months[m].prot)months[m].prot=0;
    if(!months[m].nutrDays)months[m].nutrDays=0;
    months[m].kcalIn+=n.kcal||0;
    months[m].prot+=n.prot||0;
    months[m].nutrDays++;
  });
  return Object.entries(months).sort((a,b)=>a[0].localeCompare(b[0])).slice(-6);
}
function getNutrStats(nutrEntries,tdeeEntries,bwEntries,sessions){
  const entries=Object.entries(nutrEntries||{}).sort((a,b)=>a[0].localeCompare(b[0]));
  if(!entries.length)return null;
  const avgKcal=Math.round(entries.reduce((t,[,n])=>t+(n.kcal||0),0)/entries.length);
  const avgProt=Math.round(entries.reduce((t,[,n])=>t+(n.prot||0),0)/entries.length);
  const avgCarb=Math.round(entries.reduce((t,[,n])=>t+(n.carb||0),0)/entries.length);
  const avgFat=Math.round(entries.reduce((t,[,n])=>t+(n.fat||0),0)/entries.length);
  // macro % split
  const totalCal=avgProt*4+avgCarb*4+avgFat*9;
  const protPct=totalCal>0?Math.round(avgProt*4/totalCal*100):0;
  const carbPct=totalCal>0?Math.round(avgCarb*4/totalCal*100):0;
  const fatPct=totalCal>0?Math.round(avgFat*9/totalCal*100):0;
  // training days kcal vs rest days
  const trainDates=new Set(sessions.map(s=>s.date));
  const trainEntries=entries.filter(([d])=>trainDates.has(d));
  const restEntries=entries.filter(([d])=>!trainDates.has(d));
  const avgKcalTrain=trainEntries.length?Math.round(trainEntries.reduce((t,[,n])=>t+(n.kcal||0),0)/trainEntries.length):0;
  const avgKcalRest=restEntries.length?Math.round(restEntries.reduce((t,[,n])=>t+(n.kcal||0),0)/restEntries.length):0;
  // surplus/deficit
  const balDays=entries.filter(([d])=>tdeeEntries[d]).map(([d,n])=>({date:d,bal:n.kcal-(tdeeEntries[d]||0)}));
  const surplusDays=balDays.filter(x=>x.bal>0).length;
  const deficitDays=balDays.filter(x=>x.bal<0).length;
  const avgBal=balDays.length?Math.round(balDays.reduce((t,x)=>t+x.bal,0)/balDays.length):null;
  // prot/kg
  const lastBw=bwEntries&&bwEntries.length?bwEntries[bwEntries.length-1]:null;
  const protPerKg=lastBw&&lastBw.w&&avgProt?Math.round(avgProt/lastBw.w*10)/10:null;
  // trend kcal ultimi 30gg
  const last30=entries.slice(-30);
  const trend30=last30.length>=7?(()=>{
    const half=Math.floor(last30.length/2);
    const h1=last30.slice(0,half).reduce((t,[,n])=>t+(n.kcal||0),0)/half;
    const h2=last30.slice(half).reduce((t,[,n])=>t+(n.kcal||0),0)/(last30.length-half);
    return Math.round(h2-h1);
  })():null;
  return{avgKcal,avgProt,avgCarb,avgFat,protPct,carbPct,fatPct,totalCal,
    avgKcalTrain,avgKcalRest,surplusDays,deficitDays,avgBal,protPerKg,trend30,
    loggedDays:entries.length,balDays};
}
function getDeloadSuggestion(sessions){
  // controlla ultimi 21gg per segni di sovraccarico
  const recent=sessions.filter(s=>{const d=new Date(s.date);return(Date.now()-d)/86400000<=21;});
  if(recent.length<6)return null;
  const hardSets=recent.flatMap(s=>s.exercises.filter(e=>e.score>=4)).length;
  const totalSets=recent.flatMap(s=>s.exercises).length;
  const hardRatio=totalSets>0?hardSets/totalSets:0;
  const weekCount=recent.length;
  if(hardRatio>0.45&&weekCount>=5)return{type:"DELOAD",msg:`${Math.round(hardRatio*100)}% degli esercizi recenti segnati come difficili. Considera una settimana di scarico.`};
  if(weekCount>=8&&recent.every(s=>s.exercises.some(e=>e.score>=4)))return{type:"DELOAD",msg:"Hai trainato molto di fila con carichi alti. Una settimana leggera può migliorare le prestazioni."};
  return null;
}

// Wilks coefficient (2020 formula, unisex)
function wilksCoeff(bwKg){
  const a=-216.0475144,b=16.2606339,c=-0.002388645,d=-0.00113732,e=7.01863e-6,f=-1.291e-8;
  return 600/(a+b*bwKg+c*bwKg**2+d*bwKg**3+e*bwKg**4+f*bwKg**5);
}
function calcWilks(totalLifted,bwKg){
  if(!bwKg||!totalLifted)return null;
  return Math.round(totalLifted*wilksCoeff(bwKg)*10)/10;
}

// IPF GL Points (2020)
function ipfGL(totalKg,bwKg,isMale){
  const [a,b,c]=isMale?[1199.72839,1025.18162,0.009210]:[610.32796,1045.59282,0.03048];
  const denom=a-b*Math.exp(-c*bwKg);
  if(denom<=0)return null;
  return Math.round(totalKg/denom*100*10)/10;
}

const STD_LABELS=["Principiante","Novice","Intermedio","Avanzato","Elite"];
const STD_COLORS=["#6b7280","#3b82f6","#10b981","#f59e0b","#ef4444"];

function getStrengthStd(exName,orm,bwKg,isMale=true){
  const std=STRENGTH_STANDARDS[exName];
  if(!std||!bwKg||!orm)return null;
  const ratios=isMale?std.m:std.f;
  // For pull-ups (reps-based), treat differently
  const ratio=orm/bwKg;
  let level=-1;
  for(let i=0;i<ratios.length;i++){if(ratio>=ratios[i])level=i;}
  return{level,label:level>=0?STD_LABELS[level]:"Sub-Principiante",color:level>=0?STD_COLORS[level]:"#555",ratio:Math.round(ratio*100)/100,next:ratios[level+1]||null};
}

// Push/Pull balance (last 4 weeks)
function getPushPullBalance(sessions){
  const PUSH=["Petto","Spalle","Tricipiti"];
  const PULL=["Schiena","Bicipiti"];
  const recent=sessions.filter(s=>{const d=new Date(s.date);return(Date.now()-d)/86400000<=28;});
  let pushVol=0,pullVol=0;
  recent.forEach(s=>s.exercises.forEach(e=>{
    const v=(e.sets||1)*e.reps*e.weight;
    if(PUSH.includes(e.muscle))pushVol+=v;
    else if(PULL.includes(e.muscle))pullVol+=v;
  }));
  const total=pushVol+pullVol;
  if(!total)return null;
  const ratio=pullVol>0?Math.round(pushVol/pullVol*100)/100:null;
  return{pushVol:Math.round(pushVol),pullVol:Math.round(pullVol),ratio,
    status:!ratio?"N/D":ratio<0.8?"PULL DOMINANTE":ratio>1.3?"PUSH DOMINANTE":"BILANCIATO",
    pushPct:Math.round(pushVol/total*100),pullPct:Math.round(pullVol/total*100)};
}

// Mifflin-St Jeor BMR
function calcBMR(weightKg,heightCm,age,isMale){
  if(!weightKg||!heightCm||!age)return null;
  const base=10*weightKg+6.25*heightCm-(5*age);
  return Math.round(isMale?base+5:base-161);
}
// TDEE from actual training data
function calcSmartTDEE(bmr,sessions,actEntries){
  if(!bmr)return null;
  // Count average workouts/week from last 4 weeks
  const recent=sessions.filter(s=>(Date.now()-new Date(s.date))/86400000<=28);
  const wkFreq=recent.length/4;
  // Activity multiplier
  let mult;
  if(wkFreq<1)mult=1.2;
  else if(wkFreq<2)mult=1.375;
  else if(wkFreq<4)mult=1.55;
  else if(wkFreq<6)mult=1.725;
  else mult=1.9;
  return{tdee:Math.round(bmr*mult),mult,wkFreq:Math.round(wkFreq*10)/10,
    bulk:Math.round(bmr*mult+300),cut:Math.round(bmr*mult-500),maintain:Math.round(bmr*mult)};
}

// Protein timing score (how well distributed across the day - simulated from meal count)
function getProteinTimingScore(nutrEntries,sessions){
  const entries=Object.entries(nutrEntries||{});
  if(entries.length<5)return null;
  const trainDates=new Set(sessions.map(s=>s.date));
  let score=0,count=0;
  entries.forEach(([d,n])=>{
    if(!n.prot)return;
    count++;
    // Optimal: ~0.4g/kg per meal, 3-5 meals. We estimate from daily total.
    // Score 0-100 based on proximity to 2g/kg (using 75kg as default)
    const opt=150; // ~2g/kg for 75kg
    const proximity=1-Math.min(Math.abs(n.prot-opt)/opt,1);
    score+=proximity*100;
    // Bonus for training days with higher protein
    if(trainDates.has(d)&&n.prot>120)score+=5;
  });
  return Math.round(score/count);
}

// ══════════════════════════════════════════════
// ── PLATEAU DETECTOR + LINEAR REGRESSION ──
// ══════════════════════════════════════════════
function linReg(points) {
  // points: [{x, y}]
  const n = points.length;
  if (n < 3) return null;
  const sumX  = points.reduce((t,p) => t+p.x, 0);
  const sumY  = points.reduce((t,p) => t+p.y, 0);
  const sumXY = points.reduce((t,p) => t+p.x*p.y, 0);
  const sumX2 = points.reduce((t,p) => t+p.x*p.x, 0);
  const denom = n*sumX2 - sumX*sumX;
  if (!denom) return null;
  const m = (n*sumXY - sumX*sumY) / denom;
  const b = (sumY - m*sumX) / n;
  const r2 = (()=>{
    const yMean = sumY/n;
    const ssTot = points.reduce((t,p) => t+(p.y-yMean)**2, 0);
    const ssRes = points.reduce((t,p) => t+(p.y-(m*p.x+b))**2, 0);
    return ssTot > 0 ? Math.max(0, 1-ssRes/ssTot) : 0;
  })();
  return {m, b, r2};
}

function detectPlateau(exName, sessions, thresholdSessions=4) {
  const hist = sessions
    .flatMap(s => s.exercises
      .filter(e => e.name===exName && e.weight>0 && e.reps>0)
      .map(e => ({date:s.date, orm:oneRM(e.weight,e.reps), weight:e.weight}))
    ).slice(-12);
  if (hist.length < thresholdSessions) return null;
  const recent = hist.slice(-thresholdSessions);
  const maxW = Math.max(...recent.map(e => e.orm));
  const minW = Math.min(...recent.map(e => e.orm));
  const variance = maxW - minW;
  const isPlateau = variance <= 2.5; // within 2.5kg = plateau
  return {isPlateau, variance: Math.round(variance*10)/10,
    sessions: thresholdSessions, maxW, minW};
}

function getORMProjection(exName, sessions, weeksAhead=[4,8,12]) {
  const hist = sessions
    .flatMap(s => s.exercises
      .filter(e => e.name===exName && e.weight>0 && e.reps>0)
      .map(e => ({date:s.date, orm:oneRM(e.weight,e.reps)}))
    );
  if (hist.length < 4) return null;
  // Convert dates to week numbers relative to first
  const t0 = new Date(hist[0].date).getTime();
  const pts = hist.map(h => ({
    x: (new Date(h.date).getTime()-t0) / (7*86400000),
    y: h.orm
  }));
  const reg = linReg(pts);
  if (!reg || reg.r2 < 0.1) return null;
  const currentWeek = pts[pts.length-1].x;
  const projections = weeksAhead.map(w => ({
    weeks: w,
    orm: Math.round(reg.m*(currentWeek+w)+reg.b)
  }));
  return {reg, projections, currentOrm: hist[hist.length-1].orm,
    weeklyGain: Math.round(reg.m*10)/10, r2: Math.round(reg.r2*100)};
}

function calcFFMI(weightKg, heightCm, fatPct) {
  if (!weightKg || !heightCm || fatPct==null) return null;
  const leanMass = weightKg * (1 - fatPct/100);
  const heightM  = heightCm / 100;
  const ffmi     = leanMass / (heightM*heightM);
  const normalizedFFMI = ffmi + 6.1*(1.8 - heightM);
  let level, color;
  if (normalizedFFMI < 18)      {level="Sotto media";  color="#6b7280";}
  else if (normalizedFFMI < 20) {level="Media";        color="#3b82f6";}
  else if (normalizedFFMI < 22) {level="Buono";        color="#10b981";}
  else if (normalizedFFMI < 23) {level="Ottimo";       color="#f59e0b";}
  else if (normalizedFFMI < 26) {level="Eccellente";   color:"#ef4444";}
  else                          {level="Elite/PED";    color="#8b5cf6";}
  return {
    ffmi: Math.round(ffmi*10)/10,
    normalized: Math.round(normalizedFFMI*10)/10,
    leanMass: Math.round(leanMass*10)/10,
    level, color,
    naturalLimit: 25,
    pctToNatLimit: Math.min(normalizedFFMI/25*100, 100)
  };
}

// ══════════════════════════════════════════════
// ── NUTRITION ↔ PERFORMANCE CORRELATION ──
// ══════════════════════════════════════════════
function getNutrPerfCorrelation(sessions, nutrEntries) {
  // Match sessions with nutrition data from same/previous day
  const paired = sessions
    .filter(s => nutrEntries[s.date] || nutrEntries[
      new Date(new Date(s.date)-86400000).toISOString().slice(0,10)
    ])
    .map(s => {
      const n = nutrEntries[s.date] ||
        nutrEntries[new Date(new Date(s.date)-86400000).toISOString().slice(0,10)];
      const vol = sessionVol(s);
      const avgScore = s.exercises.filter(e=>e.score>0).length
        ? s.exercises.filter(e=>e.score>0).reduce((t,e)=>t+e.score,0) /
          s.exercises.filter(e=>e.score>0).length
        : null;
      return {date:s.date, kcal:n.kcal||0, prot:n.prot||0, carb:n.carb||0,
              vol, avgScore, duration:s.duration||0};
    })
    .filter(p => p.kcal > 0 && p.vol > 0);

  if (paired.length < 5) return null;

  // Correlation kcal vs volume
  const kcalPts = paired.map((p,i) => ({x:p.kcal, y:p.vol}));
  const protPts = paired.map((p,i) => ({x:p.prot, y:p.vol}));
  const regKcal = linReg(kcalPts);
  const regProt = linReg(protPts);

  // Split into high/low kcal days and compare volume
  const sorted = [...paired].sort((a,b)=>a.kcal-b.kcal);
  const half = Math.floor(sorted.length/2);
  const lowKcal  = sorted.slice(0,half);
  const highKcal = sorted.slice(half);
  const avgVolLow  = Math.round(lowKcal.reduce((t,p)=>t+p.vol,0)/lowKcal.length);
  const avgVolHigh = Math.round(highKcal.reduce((t,p)=>t+p.vol,0)/highKcal.length);
  const avgKcalLow  = Math.round(lowKcal.reduce((t,p)=>t+p.kcal,0)/lowKcal.length);
  const avgKcalHigh = Math.round(highKcal.reduce((t,p)=>t+p.kcal,0)/highKcal.length);
  const volDeltaPct = avgVolLow>0?Math.round((avgVolHigh-avgVolLow)/avgVolLow*100):0;

  return {paired, regKcal, regProt, avgVolLow, avgVolHigh,
          avgKcalLow, avgKcalHigh, volDeltaPct, n:paired.length};
}

function getDietQualityScore(nutrEntries, tdeeEntries, sessions, bwKg) {
  const entries = Object.entries(nutrEntries||{});
  if (entries.length < 5) return null;
  let score = 0; const breakdown = [];

  // 1. Consistency (30pts) — how many days logged in last 30
  const last30 = entries.filter(([d]) => {
    return (Date.now()-new Date(d))/86400000 <= 30;
  });
  const consistencyScore = Math.round(last30.length/30*30);
  score += consistencyScore;
  breakdown.push({label:"Consistenza", score:consistencyScore, max:30,
    note:last30.length+"/30 giorni registrati"});

  // 2. Protein adequacy (25pts)
  const avgProt = entries.reduce((t,[,n])=>t+(n.prot||0),0)/entries.length;
  const optProt = bwKg?bwKg*1.8:150;
  const protScore = Math.min(Math.round(avgProt/optProt*25), 25);
  score += protScore;
  breakdown.push({label:"Proteine", score:protScore, max:25,
    note:Math.round(avgProt)+"g media (target "+Math.round(optProt)+"g)"});

  // 3. Calorie proximity to TDEE (25pts)
  const balEntries = entries.filter(([d])=>tdeeEntries[d]);
  if (balEntries.length >= 3) {
    const avgBal = balEntries.reduce((t,[d,n])=>t+Math.abs(n.kcal-(tdeeEntries[d]||0)),0)/balEntries.length;
    const calScore = Math.round(Math.max(0, 25 - avgBal/100));
    score += calScore;
    breakdown.push({label:"Bilancio calorico", score:calScore, max:25,
      note:"Deviazione media: "+Math.round(avgBal)+"kcal/giorno"});
  }

  // 4. Macro balance (20pts)
  const avgCarb = entries.reduce((t,[,n])=>t+(n.carb||0),0)/entries.length;
  const avgFat  = entries.reduce((t,[,n])=>t+(n.fat||0),0)/entries.length;
  const totalCal = avgProt*4+avgCarb*4+avgFat*9;
  const protPct = totalCal>0?avgProt*4/totalCal:0;
  const macroScore = protPct>=0.25&&protPct<=0.40 ? 20 : protPct>=0.2 ? 12 : 5;
  score += macroScore;
  breakdown.push({label:"Split macros", score:macroScore, max:20,
    note:"Proteine: "+Math.round(protPct*100)+"% (ottimale 25–40%)"});

  const grade = score>=85?"A":score>=70?"B":score>=55?"C":score>=40?"D":"F";
  const gradeColor = score>=85?"#10b981":score>=70?"#f59e0b":score>=55?"#f97316":"#ef4444";
  return {score:Math.min(score,100), grade, gradeColor, breakdown};
}

function oneRM(w,r){return r<=1?w:Math.round(w*(1+r/30));}

function getRecords(sessions){

function getStreak(sessions){
  if(!sessions.length)return 0;
  const toWeek=d=>{const dt=new Date(d),day=dt.getDay()||7;dt.setDate(dt.getDate()+1-day);return dt.toISOString().slice(0,10);};
  const weeks=[...new Set([...sessions].map(s=>s.date).sort().reverse().map(toWeek))];
  let s=1;for(let i=0;i<weeks.length-1;i++){if((new Date(weeks[i])-new Date(weeks[i+1]))/604800000<=1)s++;else break;}return s;
}
function getWeekDays(offset=0){
  const today=new Date(),dow=today.getDay()||7;
  const mon=new Date(today);mon.setDate(today.getDate()-dow+1+offset*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function groupByWeek(sessions){
  const weeks={};
  sessions.forEach(s=>{
    const d=new Date(s.date),day=d.getDay()||7;
    d.setDate(d.getDate()+1-day);const wk=d.toISOString().slice(0,10);
    if(!weeks[wk])weeks[wk]=[];weeks[wk].push(s);
  });
  return Object.entries(weeks).sort((a,b)=>b[0].localeCompare(a[0]));
}

function getSuggestion(exName,minReps,maxReps,step,sessions){
  const st=step||2.5;
  const history=sessions.flatMap(s=>s.exercises.filter(e=>e.name===exName)).filter(e=>e.weight>=0&&e.reps>0&&e.score>0);
  if(!history.length)return null;
  const {weight:lw,reps:lr,score:ls}=history[history.length-1];
  let nw=lw,nr=lr,action,badge,detail;
  if(ls===1){nw=lw+st;nr=minReps;action="AUMENTA PESO 🔺";badge="#22c55e";detail=`${lw}→${nw}kg · da ${minReps} rip`;}
  else if(ls===2){if(lr<maxReps){nr=lr+1;action="AUMENTA REPS";badge="#10b981";detail=`${lr}→${nr} rip`;}else{nw=lw+st;nr=minReps;action="AUMENTA PESO 🔺";badge="#22c55e";detail=`${lw}→${nw}kg`;}}
  else if(ls===3){if(lr<maxReps){nr=lr+1;action="AUMENTA REPS";badge="#10b981";detail=`${lr}→${nr} rip`;}else{nw=lw+st;nr=minReps;action="AUMENTA PESO 🔺";badge="#22c55e";detail=`Max! ${lw}→${nw}kg`;}}
  else if(ls===4){action="MANTIENI";badge="#f97316";detail=`${lr}×${lw}kg`;}
  else{nw=Math.max(lw-st,0);nr=minReps;action="RIDUCI PESO ↓";badge="#ef4444";detail=`${lw}→${nw}kg`;}
  return{nw,nr,action,badge,detail,lw,lr,ls};
}

// ── 1RM TREND CHART ──
// ══════════════════════════════════════════════
function ORMChart({exName,sessions,goal,C}){
  const raw=get1RMHistory(exName,sessions).slice(-12);
  if(raw.length<2)return null;
  const W=300,H=72,PX=38,PY=10;
  const vals=raw.map(d=>d.orm);
  const maxV=Math.max(...vals,...(goal?[goal]:[]))||1;
  const minV=Math.min(...vals);
  const span=maxV-minV||1;
  const pts=raw.map((d,i)=>({x:PX+(i/(raw.length-1))*(W-PX*2),y:H-PY-((d.orm-minV)/span)*(H-PY*2),...d}));
  const lD=pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ");
  const aD=`M${pts[0].x},${H-PY} ${lD.slice(1)} L${pts[pts.length-1].x},${H-PY} Z`;
  const gid=`orm_${exName.replace(/\W/g,"_")}`;
  const gY=goal&&goal>=minV?H-PY-((Math.min(goal,maxV)-minV)/span)*(H-PY*2):null;
  const pred=goal?predictPR(exName,goal,sessions):null;
  return(
    <div style={{marginTop:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
        <p style={{margin:0,fontSize:8,letterSpacing:2,color:"#8b5cf6"}}>1RM STIMATO NEL TEMPO</p>
        <span style={{fontSize:10,fontWeight:900,color:"#8b5cf6"}}>{pts[pts.length-1].orm}kg</span>
      </div>
      <svg width="100%" viewBox={`0 0 ${W} ${H+18}`} style={{overflow:"visible",display:"block",margin:"4px 0"}}>
        <defs>
          <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#8b5cf6" stopOpacity="0.35"/>
            <stop offset="100%" stopColor="#8b5cf6" stopOpacity="0"/>
          </linearGradient>
        </defs>
        <path d={aD} fill={`url(#${gid})`}/>
        <path d={lD} fill="none" stroke="#8b5cf6" strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
        {gY!=null&&<>
          <line x1={PX} y1={gY} x2={W-PX} y2={gY} stroke="#f59e0b" strokeWidth={1.5} strokeDasharray="5 4"/>
          <text x={W-PX+4} y={gY+4} fill="#f59e0b" fontSize={7}>🎯{goal}</text>
        </>}
        {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={4} fill="#8b5cf6" stroke={C.bg2} strokeWidth={2}/>)}
        <text x={pts[0].x} y={H+17} fill={C.text3} fontSize={8} textAnchor="middle">{raw[0].date.slice(5)}</text>
        <text x={pts[pts.length-1].x} y={H+17} fill={C.text3} fontSize={8} textAnchor="middle">{raw[raw.length-1].date.slice(5)}</text>
        <text x={2} y={PY+4} fill={C.text3} fontSize={8}>{maxV}kg</text>
        <text x={2} y={H-PY+4} fill={C.text3} fontSize={8}>{minV}kg</text>
      </svg>
      {pred&&goal&&<p style={{margin:"4px 0 0",fontSize:9,color:"#10b981"}}>📈 Al ritmo attuale raggiungerai {goal}kg in ~{pred} {pred===1?"settimana":"settimane"}</p>}
    </div>
  );
}

// ── ANNUAL HEATMAP ──
function HeatmapChart({sessions,actEntries,C}){
  const today=new Date();
  const cells=[];
  for(let i=363;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    cells.push({iso:d.toISOString().slice(0,10),day:d.getDay(),week:Math.floor(i/7)});
  }
  const countMap={};
  sessions.forEach(s=>{countMap[s.date]=(countMap[s.date]||0)+1;});
  // include activities
  const actMap={};
  Object.entries(actEntries||{}).forEach(([d,acts])=>{if(acts.length)actMap[d]=acts.length;});
  const maxCount=Math.max(...Object.values(countMap),1);
  // group by week column
  const weeks=[];
  cells.forEach(c=>{if(!weeks[c.week])weeks[c.week]=[];weeks[c.week].push(c);});
  const months=[];
  let lastM=-1;
  weeks.forEach((wk,wi)=>{
    const m=parseInt(wk[0]?.iso.slice(5,7))-1;
    if(m!==lastM){months.push({wi,label:["G","F","M","A","M","G","L","A","S","O","N","D"][m]});lastM=m;}
  });
  const sz=11,gap=2;
  return(
    <div>
      <p style={{fontSize:9,letterSpacing:2,color:C.text3,margin:"0 0 8px"}}>HEATMAP ANNO</p>
      <div style={{overflowX:"auto",paddingBottom:4}}>
        <div style={{position:"relative",display:"inline-block"}}>
          {/* month labels */}
          <div style={{display:"flex",marginBottom:3,position:"relative",height:10}}>
            {months.map((m,i)=>(
              <span key={i} style={{position:"absolute",left:(weeks.length-1-m.wi)*(sz+gap),fontSize:7,color:C.text3,lineHeight:1}}>{m.label}</span>
            ))}
          </div>
          <div style={{display:"flex",flexDirection:"row-reverse",gap:gap}}>
            {weeks.map((wk,wi)=>(
              <div key={wi} style={{display:"flex",flexDirection:"column",gap:gap}}>
                {Array.from({length:7}).map((_,di)=>{
                  const cell=wk.find(c=>(c.day===0?6:c.day-1)===di);
                  const cnt=cell?countMap[cell.iso]||0:0;
                  const haActs=cell?actMap[cell.iso]||0:0;
                  const alpha=cnt===0?0.06:0.15+(cnt/maxCount)*0.85;
                  const isToday=cell?.iso===today.toISOString().slice(0,10);
                  // colore: rosso per palestra, verde per solo attività
                  const bg=cnt>0?`rgba(239,68,68,${alpha})`:haActs>0?`rgba(16,185,129,0.4)`:C.bg4;
                  return(
                    <div key={di} title={cell?`${cell.iso}: ${cnt} sessioni${haActs?" + "+haActs+" attività":""}`:""} style={{width:sz,height:sz,borderRadius:2,background:bg,border:isToday?`1px solid #ef4444`:"1px solid transparent"}}/>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center",marginTop:6,flexWrap:"wrap"}}>
        <span style={{fontSize:7,color:C.text3}}>0</span>
        {[0.1,0.35,0.6,0.85].map((a,i)=><div key={i} style={{width:8,height:8,borderRadius:2,background:`rgba(239,68,68,${a})`}}/>)}
        <span style={{fontSize:7,color:C.text3}}>gym</span>
        <div style={{width:8,height:8,borderRadius:2,background:"rgba(16,185,129,0.4)"}}/>
        <span style={{fontSize:7,color:C.text3}}>attività</span>
        <span style={{fontSize:7,color:C.text3,marginLeft:"auto"}}>{sessions.length} sessioni · {Object.keys(actMap).length} gg att.</span>
      </div>
    </div>
  );
}

// ── RADAR MUSCOLARE ──
function RadarChart({sessions,C}){
  const groups=["Petto","Schiena","Spalle","Bicipiti","Tricipiti","Gambe","Addominali"];
  const counts={};groups.forEach(g=>counts[g]=0);
  const recent=sessions.filter(s=>{const d=new Date(s.date);const now=new Date();return(now-d)/(1000*60*60*24)<=28;});
  if(recent.length<2)return null;
  recent.forEach(s=>s.exercises.forEach(e=>{if(counts[e.muscle]!==undefined)counts[e.muscle]++;}));
  const maxV=Math.max(...Object.values(counts),1);
  const n=groups.length,cx=120,cy=115,r=80;
  const angle=(i)=>(-Math.PI/2)+(2*Math.PI/n)*i;
  const pt=(i,val)=>{const a=angle(i),rad=(val/maxV)*r;return[cx+rad*Math.cos(a),cy+rad*Math.sin(a)];};
  const outline=groups.map((_,i)=>pt(i,1));
  const datapts=groups.map((g,i)=>pt(i,counts[g]/maxV));
  const polyOutline=outline.map(p=>p.join(",")).join(" ");
  const polyData=datapts.map(p=>p.join(",")).join(" ");
  return(
    <div>
      <p style={{fontSize:9,letterSpacing:2,color:C.text3,margin:"0 0 4px"}}>BILANCIAMENTO MUSCOLARE — 4 SETTIMANE</p>
      <svg width="100%" viewBox="0 0 240 230" style={{display:"block"}}>
        {/* grid rings */}
        {[0.25,0.5,0.75,1].map(f=>(
          <polygon key={f} points={groups.map((_,i)=>pt(i,f)).map(p=>p.join(",")).join(" ")} fill="none" stroke={C.border} strokeWidth={0.8} opacity={0.5}/>
        ))}
        {/* axes */}
        {groups.map((_,i)=>{
          const [x2,y2]=pt(i,1);
          return<line key={i} x1={cx} y1={cy} x2={x2} y2={y2} stroke={C.border2} strokeWidth={0.8}/>;
        })}
        {/* data area */}
        <polygon points={polyData} fill="#ef444430" stroke="#ef4444" strokeWidth={2} strokeLinejoin="round"/>
        {/* dots */}
        {datapts.map(([x,y],i)=><circle key={i} cx={x} cy={y} r={3.5} fill="#ef4444" stroke={C.bg2} strokeWidth={1.5}/>)}
        {/* labels */}
        {groups.map((g,i)=>{
          const a=angle(i);const [x,y]=pt(i,1.22);
          return(
            <g key={g}>
              <text x={x} y={y} textAnchor="middle" dominantBaseline="middle" fill={counts[g]>0?MUSCLE_COLORS[g]:C.text4} fontSize={9} fontWeight={counts[g]>0?700:400}>{g}</text>
              {counts[g]>0&&<text x={x} y={y+11} textAnchor="middle" fill={C.text3} fontSize={7}>{counts[g]}</text>}
            </g>
          );
        })}
      </svg>
    </div>
  );
}

// ── CONSISTENCY TRACKER ──
function ConsistencyBar({sessions,C}){
  const weeks=[];
  for(let w=7;w>=0;w--){
    const start=new Date();start.setDate(start.getDate()-start.getDay()+1-(w*7));
    const end=new Date(start);end.setDate(start.getDate()+6);
    const s0=start.toISOString().slice(0,10),e0=end.toISOString().slice(0,10);
    const cnt=sessions.filter(s=>s.date>=s0&&s.date<=e0).length;
    weeks.push({cnt,label:w===0?"Questa":w===1?"Scorsa":`-${w}s`});
  }
  const goal=3;
  const onTarget=weeks.filter(w=>w.cnt>=goal).length;
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <p style={{margin:0,fontSize:9,letterSpacing:2,color:C.text3}}>CONSISTENZA (8 SETTIMANE)</p>
        <span style={{fontSize:9,color:onTarget>=6?"#10b981":onTarget>=4?"#f59e0b":"#ef4444",fontWeight:700}}>{onTarget}/8 ≥{goal}×</span>
      </div>
      <div style={{display:"flex",gap:3,alignItems:"flex-end"}}>
        {weeks.map((w,i)=>{
          const h=Math.max(w.cnt*14,4);
          const col=w.cnt>=goal?"#10b981":w.cnt>=1?"#f59e0b":"#ef444433";
          const isThis=i===weeks.length-1;
          return(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <span style={{fontSize:8,color:isThis?"#ef4444":C.text3,fontWeight:isThis?700:400}}>{w.cnt||""}</span>
              <div style={{width:"100%",height:h,background:col,borderRadius:3,transition:"height 0.4s"}}/>
              <span style={{fontSize:6,color:C.text4,whiteSpace:"nowrap"}}>{w.label}</span>
            </div>
          );
        })}
      </div>
      <div style={{marginTop:8,height:4,borderRadius:2,background:C.bg4,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${(onTarget/8)*100}%`,background:onTarget>=6?"#10b981":onTarget>=4?"#f59e0b":"#ef4444",borderRadius:2,transition:"width 0.6s"}}/>
      </div>
      <p style={{margin:"5px 0 0",fontSize:8,color:C.text3}}>{Math.round(onTarget/8*100)}% delle settimane con obiettivo raggiunto ({goal}+ sessioni)</p>
    </div>
  );
}


const ACT_COLORS={"Palestra":"#ef4444","Corsa":"#10b981","Tennis":"#f59e0b","Calcetto":"#22c55e","Padel":"#06b6d4","Nuoto":"#3b82f6","Ciclismo":"#f97316","Camminata":"#84cc16","HIIT":"#ec4899","Yoga":"#8b5cf6","Altro":"#6b7280"};
const ACT_ICONS={"Palestra":"🏋","Corsa":"🏃","Tennis":"🎾","Calcetto":"⚽","Padel":"🏸","Nuoto":"🏊","Ciclismo":"🚴","Camminata":"🚶","HIIT":"⚡","Yoga":"🧘","Altro":"🏅"};

function WeekCalendar({sessions,program,actEntries,C,offset,setOffset}){
  const days=getWeekDays(offset);
  const today=todayISO();
  const sessMap={};
  sessions.forEach(s=>{if(!sessMap[s.date])sessMap[s.date]=[];sessMap[s.date].push(s);});
  // mappa dayName → colore
  const dayColorMap={};
  (program?.days||[]).forEach((d,i)=>{dayColorMap[d.name]=d.color||DAY_COLORS[i%DAY_COLORS.length];});
  const dl=["L","M","M","G","V","S","D"];
  const d0=days[0].toISOString().slice(0,10);
  const d6=days[6].toISOString().slice(0,10);
  const wkSess=sessions.filter(s=>s.date>=d0&&s.date<=d6);
  const wkVol=Math.round(wkSess.reduce((t,s)=>t+sessionVol(s),0));
  const wkKcalGym=wkSess.reduce((t,s)=>t+(s.kcal||0),0);
  // attività extra della settimana
  const wkActEntries=Object.entries(actEntries||{}).filter(([d])=>d>=d0&&d<=d6);
  const wkActKcal=wkActEntries.reduce((t,[,acts])=>t+acts.reduce((s,a)=>s+(a.kcal||0),0),0);
  const wkActMin=wkActEntries.reduce((t,[,acts])=>t+acts.reduce((s,a)=>s+(a.min||0),0),0);
  const wkKcal=wkKcalGym+wkActKcal;
  const wkActivities=wkActEntries.reduce((t,[,acts])=>t+acts.length,0);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <button onClick={()=>setOffset(o=>o-1)} style={{background:"none",border:"none",color:C.text2,fontSize:22,cursor:"pointer",padding:"0 8px",lineHeight:1}}>‹</button>
        <span style={{fontSize:11,letterSpacing:1,color:C.text,fontWeight:700}}>{offset===0?"Questa settimana":offset===-1?"Settimana scorsa":`${days[0].getDate()}/${days[0].getMonth()+1} – ${days[6].getDate()}/${days[6].getMonth()+1}`}</span>
        <button onClick={()=>setOffset(o=>Math.min(o+1,0))} style={{background:"none",border:"none",color:offset===0?C.text4:C.text2,fontSize:22,cursor:"pointer",padding:"0 8px",lineHeight:1}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {days.map((d,i)=>{
          const ds=d.toISOString().slice(0,10);
          const daySess=sessMap[ds]||[];
          const dayActs=actEntries?.[ds]||[];
          const trained=daySess.length>0;
          const hasActs=dayActs.length>0;
          const isToday=ds===today;
          const dotColor=trained?(dayColorMap[daySess[0].dayName]||"#ef4444"):null;
          return(
            <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <span style={{fontSize:8,color:C.text3,letterSpacing:1}}>{dl[i]}</span>
              <div style={{width:36,height:36,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:dotColor||(isToday?C.bg4:"transparent"),border:isToday&&!trained?`2px solid #ef4444`:"2px solid transparent",fontSize:12,fontWeight:trained||isToday?700:400,color:trained?"#fff":isToday?"#ef4444":C.text2}}>
                {d.getDate()}
              </div>
              {/* pallini palestra */}
              {trained&&<div style={{display:"flex",gap:2,justifyContent:"center"}}>{daySess.slice(0,2).map((s,j)=><div key={j} style={{width:5,height:5,borderRadius:"50%",background:dayColorMap[s.dayName]||"#ef4444"}}/>)}</div>}
              {/* icone attività extra */}
              {hasActs&&<div style={{display:"flex",flexWrap:"wrap",gap:1,justifyContent:"center",maxWidth:36}}>
                {dayActs.slice(0,3).map((a,j)=>(
                  <span key={j} style={{fontSize:9,lineHeight:1}} title={`${a.type}${a.min?" · "+a.min+"min":""}`}>{ACT_ICONS[a.type]||"🏅"}</span>
                ))}
              </div>}
              {!trained&&!hasActs&&<div style={{height:8}}/>}
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:10,marginTop:10,borderTop:`1px solid ${C.border}`,paddingTop:8,flexWrap:"wrap"}}>
        <div><p style={{margin:0,fontSize:8,color:C.text3}}>SESSIONI</p><p style={{margin:0,fontSize:16,fontWeight:900,color:"#ef4444"}}>{wkSess.length}</p></div>
        {wkActivities>0&&<div><p style={{margin:0,fontSize:8,color:C.text3}}>ATTIVITÀ</p><p style={{margin:0,fontSize:16,fontWeight:900,color:"#10b981"}}>{wkActivities}</p></div>}
        {wkVol>0&&<div><p style={{margin:0,fontSize:8,color:C.text3}}>VOLUME</p><p style={{margin:0,fontSize:16,fontWeight:900,color:C.text}}>{wkVol>=1000?`${(wkVol/1000).toFixed(1)}t`:`${wkVol}kg`}</p></div>}
        {wkActMin>0&&<div><p style={{margin:0,fontSize:8,color:C.text3}}>MIN ATT.</p><p style={{margin:0,fontSize:16,fontWeight:900,color:"#06b6d4"}}>{wkActMin}</p></div>}
        {wkKcal>0&&<div><p style={{margin:0,fontSize:8,color:C.text3}}>KCAL TOT.</p><p style={{margin:0,fontSize:16,fontWeight:900,color:"#f97316"}}>{wkKcal}</p></div>}
      </div>
      {/* legenda */}
      {wkActivities>0&&(
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:6}}>
          {[...new Set(wkActEntries.flatMap(([,acts])=>acts.map(a=>a.type)))].map(t=>(
            <span key={t} style={{fontSize:8,color:C.text3}}>{ACT_ICONS[t]||"🏅"} {t}</span>
          ))}
        </div>
      )}
    </div>
  );
}

function ExerciseRow({name,sessions,goal,onGoalChange,records,C,S}){

  const hist=sessions.flatMap(s=>s.exercises.filter(e=>e.name===name&&e.weight>0).map(e=>({...e,date:s.date})));
  if(!hist.length)return null;
  const last=hist[hist.length-1],first=hist[0];
  const delta=last.weight-first.weight;
  const maxW=Math.max(...hist.map(e=>e.weight));
  const isRec=records[name]?.weight===maxW;

  const goalPct=goal?Math.min(maxW/goal,1):null;

          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>

          </div>
          {goalPct!==null&&(
            <div style={{marginTop:5,display:"flex",alignItems:"center",gap:6}}>

              <div key={l} style={{background:C.bg3,borderRadius:8,padding:"7px 8px",textAlign:"center"}}>

          <ORMChart exName={name} sessions={sessions} goal={goal} C={C}/>

// ── REST TIMER ──
function RestTimer({C,S}){
  const PRESETS=[60,90,120,180];
  const [secs,setSecs]=useState(null);const [running,setRunning]=useState(false);const [total,setTotal]=useState(90);
  const ref=useRef(null);
  const beep=()=>{try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[0,150,300].forEach(d=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.setValueAtTime(0.3,ctx.currentTime+d/1000);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d/1000+0.2);o.start(ctx.currentTime+d/1000);o.stop(ctx.currentTime+d/1000+0.25);});}catch(_){}};
  const start=(t)=>{clearInterval(ref.current);setTotal(t);setSecs(t);setRunning(true);ref.current=setInterval(()=>setSecs(s=>{if(s<=1){clearInterval(ref.current);setRunning(false);beep();return 0;}return s-1;}),1000);};
  const stop=()=>{clearInterval(ref.current);setRunning(false);setSecs(null);};
  useEffect(()=>()=>clearInterval(ref.current),[]);
  const pct=secs!=null?secs/total:0,r=20,circ=2*Math.PI*r;
  return(
    <div style={{...S.card,display:"flex",alignItems:"center",gap:12}}>
      <div style={{position:"relative",width:48,height:48,flexShrink:0}}>
        <svg width={48} height={48} style={{transform:"rotate(-90deg)"}}>
          <circle cx={24} cy={24} r={r} fill="none" stroke={C.bg4} strokeWidth={4}/>
          <circle cx={24} cy={24} r={r} fill="none" stroke={running?"#ef4444":"#444"} strokeWidth={4} strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.9s linear"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:secs!=null?11:9,fontWeight:900,color:running?"#ef4444":C.text3,lineHeight:1}}>
            {secs!=null?`${Math.floor(secs/60)}:${String(secs%60).padStart(2,"0")}`:secs===0?"✓":"–"}
          </span>
        </div>
      </div>
      <div style={{flex:1}}>
        <p style={{fontSize:8,letterSpacing:2,color:C.text3,margin:"0 0 6px"}}>⏱ RECUPERO</p>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {PRESETS.map(t=>(
            <button key={t} onClick={()=>start(t)} style={{padding:"6px 10px",borderRadius:6,border:`1px solid ${running&&total===t?"#ef4444":C.border2}`,background:running&&total===t?"#ef444418":C.bg3,color:running&&total===t?"#ef4444":C.text3,fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
              {t===60?"1'":`${t/60}'`}
            </button>
          ))}
          {running&&<button onClick={stop} style={{padding:"6px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:"transparent",color:C.text3,fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>✕</button>}
        </div>
      </div>
    </div>
  );
}

// ── IDRATAZIONE ──
function HydrationTracker({C}){
  const key="hyd_"+todayISO();
  const [g,setG]=useState(()=>db(key)||0);
  const bump=(n)=>{const v=Math.max(0,g+n);setG(v);db(key,v);};
  const pct=Math.min(g/8,1);
  return(
    <div style={{display:"flex",alignItems:"center",gap:12}}>
      <div style={{flex:1}}>
        <p style={{fontSize:8,letterSpacing:2,color:"#3b82f6",margin:"0 0 5px"}}>💧 IDRATAZIONE</p>
        <div style={{height:5,borderRadius:3,background:"#3b82f622",marginBottom:3}}><div style={{height:"100%",width:`${pct*100}%`,background:"linear-gradient(to right,#3b82f6,#06b6d4)",borderRadius:3,transition:"width 0.3s"}}/></div>
        <p style={{margin:0,fontSize:9,color:pct>=1?"#06b6d4":"#3b82f6"}}>{g}/8 bicchieri {pct>=1?"🎉":""}</p>
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <button onClick={()=>bump(-1)} style={{width:28,height:28,borderRadius:8,border:"none",background:"#3b82f622",color:"#3b82f6",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
        <span style={{fontSize:20,fontWeight:900,color:"#3b82f6",minWidth:22,textAlign:"center"}}>{g}</span>

}

// ── NUTR TREND CHART ──
function NutrChart({nutrEntries,C}){
  const [metric,setMetric]=useState("kcal");
  const days=[];for(let i=29;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().slice(0,10));}
  const raw=days.map(date=>{const n=nutrEntries[date];return n?{date,v:metric==="kcal"?n.kcal:metric==="prot"?n.prot:metric==="carb"?n.carb:n.fat}:null;}).filter(Boolean);
  const metrics=[["kcal","🔥 Calorie","#f97316"],["prot","🥩 Proteine","#ef4444"],["carb","🍞 Carboidrati","#f59e0b"],["fat","🧈 Grassi","#3b82f6"]];
  const cur=metrics.find(m=>m[0]===metric);
  const col=cur[2];
  const unit=metric==="kcal"?"kcal":"g";
  if(raw.length<2)return(
    <div>
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        {metrics.map(([k,label,c])=><button key={k} onClick={()=>setMetric(k)} style={{padding:"5px 10px",borderRadius:6,border:`1px solid ${metric===k?c:C.border2}`,background:metric===k?c+"22":"transparent",color:metric===k?c:C.text3,fontSize:10,cursor:"pointer",fontFamily:"inherit",fontWeight:metric===k?700:400}}>{label}</button>)}
      </div>
      <p style={{fontSize:9,color:C.text3,textAlign:"center",padding:"10px 0"}}>Inserisci almeno 2 giorni di dati per vedere il trend</p>
    </div>
  );
  const W=300,H=80,PX=30,PY=8;
  const vals=raw.map(d=>d.v),maxV=Math.max(...vals),minV=Math.min(...vals),span=maxV-minV||1;
  const pts=raw.map((d,i)=>({x:PX+(i/(raw.length-1))*(W-PX*2),y:H-PY-((d.v-minV)/span)*(H-PY*2),...d}));
  const lD=pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ");
  const aD=`M${pts[0].x},${H-PY} ${lD.slice(1)} L${pts[pts.length-1].x},${H-PY} Z`;
  const gid=`ng_${metric}`;
  const avg=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
  const last=raw[raw.length-1];
  return(
    <div>
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        {metrics.map(([k,label,c])=><button key={k} onClick={()=>setMetric(k)} style={{padding:"5px 10px",borderRadius:6,border:`1px solid ${metric===k?c:C.border2}`,background:metric===k?c+"22":"transparent",color:metric===k?c:C.text3,fontSize:10,cursor:"pointer",fontFamily:"inherit",fontWeight:metric===k?700:400}}>{label}</button>)}
      </div>
      <div style={{display:"flex",gap:12,marginBottom:8}}>
        <div><p style={{margin:0,fontSize:7,color:C.text3}}>ULTIMO</p><p style={{margin:0,fontSize:15,fontWeight:900,color:col}}>{last.v}{unit}</p></div>
        <div><p style={{margin:0,fontSize:7,color:C.text3}}>MEDIA 30gg</p><p style={{margin:0,fontSize:15,fontWeight:900,color:C.text}}>{avg}{unit}</p></div>
        <div><p style={{margin:0,fontSize:7,color:C.text3}}>MAX</p><p style={{margin:0,fontSize:15,fontWeight:900,color:C.text2}}>{maxV}{unit}</p></div>
      </div>
      <svg width="100%" viewBox={`0 0 ${W} ${H+20}`} style={{display:"block",overflow:"visible"}}>
        <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={col} stopOpacity="0.25"/><stop offset="100%" stopColor={col} stopOpacity="0"/></linearGradient></defs>
        <path d={aD} fill={`url(#${gid})`}/>
        <path d={lD} fill="none" stroke={col} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round"/>
        {pts.filter((_,i)=>i===0||i===pts.length-1||i===Math.floor(pts.length/2)).map((p,i)=>(
          <g key={i}><circle cx={p.x} cy={p.y} r={3.5} fill={col} stroke={C.bg2} strokeWidth={1.5}/><text x={p.x} y={H+16} fill={C.text3} fontSize={7} textAnchor="middle">{p.date.slice(5)}</text></g>
        ))}
        <text x={2} y={PY+4} fill={C.text3} fontSize={7}>{maxV}{unit}</text>
        <text x={2} y={H-PY+5} fill={C.text3} fontSize={7}>{minV}{unit}</text>
      </svg>
    </div>
  );
}

        ))}
        <text x={0} y={PY+4} fill={C.text3} fontSize={7}>{maxV}{unit}</text>
        <text x={0} y={H-PY+5} fill={C.text3} fontSize={7}>{minV}{unit}</text>
      </svg>
    </div>
  );
}

// ── SURPLUS/DEFICIT CHART ──
function SurplusChart({nutrEntries,tdeeEntries,C}){
  // Build last 14 days of data
  const days=[];
  for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().slice(0,10));}
  const data=days.map(date=>{
    const kcalIn=nutrEntries[date]?.kcal||null;
    const kcalOut=tdeeEntries[date]||null;
    const balance=(kcalIn!=null&&kcalOut!=null)?kcalIn-kcalOut:null;
    return{date,kcalIn,kcalOut,balance};
  }).filter(d=>d.balance!=null);
  if(data.length<1)return(
    <div style={{textAlign:"center",padding:"18px 0"}}>
      <p style={{fontSize:10,color:C.text3,margin:0}}>Inserisci calorie introdotte (Nutrizione) e calorie bruciate per vedere il grafico</p>
    </div>
  );
  const W=320,H=90,PX=8,PY=10;
  const maxAbs=Math.max(...data.map(d=>Math.abs(d.balance)),1);
  const midY=H/2;
  const barW=Math.max(2,Math.floor((W-PX*2)/data.length)-2);
  return(
    <div>
      <svg width="100%" viewBox={`0 0 ${W} ${H+24}`} style={{display:"block",overflow:"visible"}}>
        {/* zero line */}
        <line x1={PX} y1={midY} x2={W-PX} y2={midY} stroke={C.border2} strokeWidth={1} strokeDasharray="4 3"/>
        <text x={2} y={midY-3} fill={C.text3} fontSize={7}>0</text>
        {data.map((d,i)=>{
          const x=PX+i*((W-PX*2)/data.length)+(((W-PX*2)/data.length)-barW)/2;
          const barH=Math.max(2,(Math.abs(d.balance)/maxAbs)*(midY-PY));
          const surplus=d.balance>0;
          const barY=surplus?midY-barH:midY;
          const col=surplus?"#10b981":"#ef4444";
          const isToday=d.date===todayISO();
          return(
            <g key={d.date}>
              <rect x={x} y={barY} width={barW} height={barH} fill={col} opacity={isToday?1:0.65} rx={2}/>
              {isToday&&<rect x={x-1} y={barY-1} width={barW+2} height={barH+2} fill="none" stroke={col} strokeWidth={1.5} rx={2}/>}
              {(i===0||i===data.length-1||isToday)&&(
                <text x={x+barW/2} y={H+18} fill={isToday?C.text:C.text3} fontSize={7} textAnchor="middle">{d.date.slice(5)}</text>
              )}
              {isToday&&(
                <text x={x+barW/2} y={surplus?barY-3:barY+barH+9} fill={col} fontSize={8} fontWeight="bold" textAnchor="middle">
                  {d.balance>0?"+":""}{d.balance}
                </text>
              )}
            </g>
          );
        })}
      </svg>
      <div style={{display:"flex",gap:14,marginTop:4}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,background:"#10b981",borderRadius:2}}/><span style={{fontSize:8,color:C.text3}}>SURPLUS</span></div>
        <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,background:"#ef4444",borderRadius:2}}/><span style={{fontSize:8,color:C.text3}}>DEFICIT</span></div>
        {data.length>0&&(()=>{const avg=Math.round(data.reduce((s,d)=>s+d.balance,0)/data.length);return<span style={{fontSize:8,color:avg>=0?"#10b981":"#ef4444",marginLeft:"auto",fontWeight:700}}>Media: {avg>=0?"+":""}{avg} kcal/g</span>;})()}
      </div>
    </div>
  );
}

                  <div style={{textAlign:"right"}}>
                    <p style={{margin:0,fontSize:10,color:C.text3}}>Introdotte: <span style={{color:"#f97316",fontWeight:700}}>{todayNutr?.kcal||"—"} kcal</span></p>
                    <p style={{margin:"2px 0 0",fontSize:10,color:C.text3}}>Bruciate: <span style={{color:"#3b82f6",fontWeight:700}}>{todayTdee} kcal</span></p>
                  </div>
                </div>
              </div>
            )}

            {/* Grafico surplus/deficit */}
            <div style={{...S.card,marginBottom:10}}>
              <p style={{fontSize:9,letterSpacing:2,color:C.text3,margin:"0 0 10px"}}>SURPLUS / DEFICIT — ULTIMI 14 GIORNI</p>
              <SurplusChart nutrEntries={nutrEntries} tdeeEntries={tdeeEntries} C={C}/>
            </div>

            {/* Form calorie bruciate totali con selezione data */}
            <div style={{...S.card,borderLeft:`3px solid #f97316`}}>
              <p style={{fontSize:9,letterSpacing:2,color:C.text3,margin:"0 0 8px"}}>🔥 CALORIE BRUCIATE (TOTALE GIORNATA)</p>
              <p style={{fontSize:9,color:C.text3,margin:"0 0 10px"}}>Inserisci il totale kcal bruciate nell'arco della giornata intera (metabolismo basale + attività). Usato per calcolare surplus/deficit.</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                <div>
                  <label style={S.lbl}>📅 Data</label>
                  <input type="date" style={S.inp} value={tdeeDate} max={today} onChange={e=>{setTdeeDate(e.target.value);setTdeeVal(tdeeEntries[e.target.value]||"");}}/>
                </div>
                <div>
                  <label style={S.lbl}>Kcal bruciate totali</label>
                  <input type="number" inputMode="numeric" style={S.inp} placeholder="es. 2500" value={tdeeVal} onChange={e=>setTdeeVal(e.target.value)}/>
                </div>
              </div>
              <button style={{...S.btn("red"),width:"100%",padding:12}} onClick={saveTdee}>💾 SALVA</button>
              {tdeeEntries[tdeeDate]&&(
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8,background:C.bg3,borderRadius:8,padding:"8px 10px"}}>
                  <p style={{margin:0,fontSize:11,color:"#f97316",fontWeight:700}}>✓ {tdeeEntries[tdeeDate]} kcal — {tdeeDate}</p>
                  <button onClick={()=>deleteTdee(tdeeDate)} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:14,padding:"0 4px"}}>🗑</button>
                </div>
              )}
            </div>

            {/* Storico calorie bruciate */}
            {Object.keys(tdeeEntries).length>0&&(
              <div style={{...S.card,marginTop:10}}>
                <p style={{fontSize:9,letterSpacing:2,color:C.text3,margin:"0 0 10px"}}>STORICO CALORIE BRUCIATE</p>
                {Object.entries(tdeeEntries).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,14).map(([date,kcalOut])=>{
                  const nutr=nutrEntries[date];
                  const bal=nutr?(nutr.kcal-kcalOut):null;
                  return(
                    <div key={date} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
                      <span style={{fontSize:10,color:C.text3,flexShrink:0}}>{date}</span>
                      <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        <span style={{fontSize:11,fontWeight:700,color:"#3b82f6"}}>{kcalOut} kcal</span>
                        {bal!=null&&<span style={{fontSize:10,fontWeight:700,color:bal>0?"#10b981":"#ef4444",background:bal>0?"#10b98118":"#ef444418",borderRadius:4,padding:"1px 5px"}}>{bal>0?"+":""}{bal}</span>}
                        <button onClick={()=>deleteTdee(date)} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:14,padding:"0 2px",lineHeight:1}}>🗑</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── TAB BAR ──
// ══════════════════════════════════════════════
function TabBar({view,setView,C}){
  const tabs=[
    {id:"workout",icon:"🏋",label:"WORKOUT"},
    {id:"log_active",icon:"📝",label:"LOG",hidden:true},
    {id:"finish",icon:"🏁",label:"FINE",hidden:true},
    {id:"history",icon:"📊",label:"STORICO"},
    {id:"fisico",icon:"🫀",label:"FISICO"},
    {id:"setup",icon:"⚙",label:"SETUP",hidden:true},
  ];
  const visible=tabs.filter(t=>!t.hidden);
  const active=view==="log"||view==="log_active"?"log_active":view==="finish"?"workout":view==="setup"||view==="setup-edit"?"workout":view;
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.hdr,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:300,paddingBottom:"env(safe-area-inset-bottom)"}}>
      {visible.map(t=>(
        <button key={t.id} onClick={()=>setView(t.id)} style={{flex:1,padding:"10px 4px 6px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <span style={{fontSize:18,lineHeight:1}}>{t.icon}</span>
          <span style={{fontSize:8,letterSpacing:1,color:active===t.id?"#ef4444":C.text3,fontWeight:active===t.id?700:400}}>{t.label}</span>
          {active===t.id&&<div style={{width:20,height:2,background:"#ef4444",borderRadius:1}}/>}
        </button>
      ))}
    </div>
  );
}

// ══════════════════════════════════════════════
// ── RESOCONTO SETTIMANALE (HOME) ──
// ══════════════════════════════════════════════
function WeekSummary({sessions,setSessions,nutrEntries,setNutrEntries,actEntries,setActEntries,tdeeEntries,setTdeeEntries,program,C,S}){
  const [offset,setOffset]=useState(0);
  const [selDay,setSelDay]=useState(null);
  const [editCal,setEditCal]=useState(false);
  const [editKcalIn,setEditKcalIn]=useState("");
  const [editKcalOut,setEditKcalOut]=useState("");
  const days=getWeekDays(offset);
  const today=todayISO();
  const dayColorMap={};(program?.days||[]).forEach((d,i)=>{dayColorMap[d.name]=d.color||DAY_COLORS[i%DAY_COLORS.length];});
  const dl=["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];

  const wkData=days.map((d,i)=>{
    const ds=d.toISOString().slice(0,10);
    const daySess=sessions.filter(s=>s.date===ds);
    const nutr=nutrEntries[ds];
    const acts=actEntries[ds]||[];
    const kcalIn=nutr?.kcal||0;
    // usa tdee manuale se disponibile, altrimenti somma attività + sessioni
    const kcalOut=tdeeEntries[ds]||(daySess.reduce((t,s)=>t+(s.kcal||0),0)+acts.reduce((t,a)=>t+(a.kcal||0),0))||0;
    return{ds,d,i,daySess,nutr,acts,kcalIn,kcalOut,balance:kcalIn-kcalOut,hasData:kcalIn>0||kcalOut>0||daySess.length>0};
  });
  const totKcalIn=wkData.reduce((t,x)=>t+x.kcalIn,0);
  const totKcalOut=wkData.reduce((t,x)=>t+x.kcalOut,0);
  const totProt=wkData.reduce((t,x)=>t+(x.nutr?.prot||0),0);
  const totCarb=wkData.reduce((t,x)=>t+(x.nutr?.carb||0),0);
  const totFat=wkData.reduce((t,x)=>t+(x.nutr?.fat||0),0);

  const selData=selDay?wkData.find(x=>x.ds===selDay):null;

  const openEdit=(sd)=>{
    setEditKcalIn(nutrEntries[sd.ds]?.kcal||"");
    setEditKcalOut(tdeeEntries[sd.ds]||"");
    setEditCal(true);
  };
  const saveCalEdit=(ds)=>{
    if(editKcalIn!==""){
      const prev=nutrEntries[ds]||{prot:0,carb:0,fat:0};
      const updated={...nutrEntries,[ds]:{...prev,kcal:parseInt(editKcalIn)||0}};
      setNutrEntries(updated);
    }
    if(editKcalOut!==""){
      const updated={...tdeeEntries,[ds]:parseInt(editKcalOut)||0};
      setTdeeEntries(updated);
    }
    setEditCal(false);
  };
  const deleteSession=(sessId)=>{
    const updated=sessions.filter(s=>s.id!==sessId);
    setSessions(updated);
  };
  const deleteActivity=(ds,actId)=>{
    const updated={...actEntries,[ds]:(actEntries[ds]||[]).filter(a=>a.id!==actId)};
    if(!updated[ds].length)delete updated[ds];
    setActEntries(updated);
  };

  return(
    <div style={S.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <p style={{margin:0,fontSize:9,letterSpacing:2,color:C.text3}}>RESOCONTO SETTIMANALE</p>
        <div style={{display:"flex",gap:4,alignItems:"center"}}>
          <button onClick={()=>{setOffset(o=>o-1);setSelDay(null);}} style={{background:"none",border:"none",color:C.text2,fontSize:16,cursor:"pointer",padding:"0 4px",lineHeight:1}}>‹</button>
          <span style={{fontSize:9,color:C.text3}}>{offset===0?"Questa sett.":"Sett. scorsa"}</span>
          <button onClick={()=>{setOffset(o=>Math.min(o+1,0));setSelDay(null);}} style={{background:"none",border:"none",color:offset===0?C.text4:C.text2,fontSize:16,cursor:"pointer",padding:"0 4px",lineHeight:1}}>›</button>
        </div>
      </div>

      {/* 7 colonne giornaliere */}
      <div style={{display:"flex",gap:3}}>
        {wkData.map(({ds,d,i,daySess,kcalIn,kcalOut,balance,hasData})=>{
          const isToday=ds===today;
          const isSel=selDay===ds;
          return(
            <div key={i} onClick={()=>{setSelDay(isSel?null:ds);setEditCal(false);}}
              style={{flex:1,background:isSel?"#ef444415":isToday?C.bg3:C.bg2,borderRadius:10,padding:"7px 3px",textAlign:"center",border:`1px solid ${isSel?"#ef4444":isToday?"#ef444455":C.border}`,cursor:"pointer",transition:"all 0.15s"}}>
              <p style={{margin:"0 0 2px",fontSize:8,color:isSel?"#ef4444":isToday?"#ef4444":C.text3,fontWeight:isSel||isToday?700:400}}>{dl[i]}</p>
              <p style={{margin:"0 0 3px",fontSize:11,fontWeight:700,color:C.text}}>{d.getDate()}</p>
              {daySess.length>0&&<div style={{display:"flex",gap:2,justifyContent:"center",marginBottom:3}}>
                {daySess.slice(0,2).map((s,j)=><div key={j} style={{width:6,height:6,borderRadius:"50%",background:dayColorMap[s.dayName]||"#ef4444"}}/>)}
              </div>}
              {hasData&&<>
                {kcalIn>0&&<p style={{margin:"1px 0",fontSize:7,color:"#f97316",lineHeight:1}}>+{kcalIn>999?Math.round(kcalIn/100)/10+"k":kcalIn}</p>}
                {kcalOut>0&&<p style={{margin:"1px 0",fontSize:7,color:"#ef4444",lineHeight:1}}>-{kcalOut>999?Math.round(kcalOut/100)/10+"k":kcalOut}</p>}
                {kcalIn>0&&kcalOut>0&&<div style={{fontSize:9,fontWeight:700,color:balance>0?"#f59e0b":"#10b981",lineHeight:1,marginTop:2}}>{balance>0?"▲":"▼"}{Math.abs(balance)>999?Math.round(Math.abs(balance)/100)/10+"k":Math.abs(balance)}</div>}
              </>}
            </div>
          );
        })}
      </div>

      {/* DETTAGLIO GIORNO SELEZIONATO */}
      {selData&&(
        <div style={{marginTop:12,borderTop:`1px solid ${C.border}`,paddingTop:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <p style={{margin:0,fontSize:11,fontWeight:700,color:C.text}}>{["Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato","Domenica"][selData.i]} {selData.d.getDate()}/{selData.d.getMonth()+1}</p>
            <button onClick={()=>openEdit(selData)} style={{...S.btn("ghost"),padding:"5px 10px",fontSize:9}}>✏ Modifica calorie</button>
          </div>

          {/* Form modifica calorie giorno */}
          {editCal&&(
            <div style={{...S.card,background:C.bg3,marginBottom:10,padding:"12px 14px"}}>
              <p style={{fontSize:9,letterSpacing:2,color:C.text3,margin:"0 0 10px"}}>MODIFICA CALORIE — {selData.ds}</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                <div>
                  <label style={S.lbl}>🍽 Kcal assunte</label>
                  <input type="number" inputMode="numeric" style={S.inp} placeholder="es. 2200" value={editKcalIn} onChange={e=>setEditKcalIn(e.target.value)}/>
                </div>
                <div>
                  <label style={S.lbl}>🔥 Kcal bruciate</label>
                  <input type="number" inputMode="numeric" style={S.inp} placeholder="es. 2500" value={editKcalOut} onChange={e=>setEditKcalOut(e.target.value)}/>
                </div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button style={{...S.btn("red"),flex:1,padding:10,fontSize:11}} onClick={()=>saveCalEdit(selData.ds)}>💾 Salva</button>
                <button style={{...S.btn("ghost"),padding:10,fontSize:11}} onClick={()=>setEditCal(false)}>Annulla</button>
              </div>
            </div>
          )}

          {/* bilancio calorico */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:8}}>
            <div style={{background:C.bg3,borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
              <p style={{margin:0,fontSize:7,color:C.text3,letterSpacing:1}}>CALORIE IN</p>
              <p style={{margin:0,fontSize:15,fontWeight:900,color:"#f97316"}}>{selData.kcalIn||"—"}</p>
            </div>
            <div style={{background:C.bg3,borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
              <p style={{margin:0,fontSize:7,color:C.text3,letterSpacing:1}}>CALORIE OUT</p>
              <p style={{margin:0,fontSize:15,fontWeight:900,color:"#ef4444"}}>{selData.kcalOut||"—"}</p>
            </div>
            <div style={{background:selData.balance>0?"#f59e0b18":"#10b98118",borderRadius:8,padding:"6px 8px",textAlign:"center",border:`1px solid ${selData.balance>0?"#f59e0b":"#10b981"}44`}}>
              <p style={{margin:0,fontSize:7,color:selData.balance>0?"#f59e0b":"#10b981",letterSpacing:1}}>{selData.balance>0?"SURPLUS":"DEFICIT"}</p>
              <p style={{margin:0,fontSize:15,fontWeight:900,color:selData.balance>0?"#f59e0b":"#10b981"}}>{selData.kcalIn>0&&selData.kcalOut>0?(selData.balance>0?"+":"")+selData.balance:"—"}</p>
            </div>
          </div>

          {/* MACRO */}
          {selData.nutr&&(selData.nutr.prot>0||selData.nutr.carb>0||selData.nutr.fat>0)&&(
            <>
              <p style={{margin:"0 0 5px",fontSize:8,letterSpacing:2,color:C.text3}}>MACRO</p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,marginBottom:7}}>
                {[["🥩 PROT",selData.nutr.prot+"g","#ef4444"],["🍞 CARB",selData.nutr.carb+"g","#f59e0b"],["🧈 GRASSI",selData.nutr.fat+"g","#3b82f6"]].map(([l,v,col])=>(
                  <div key={l} style={{background:col+"18",borderRadius:7,padding:"5px 6px",textAlign:"center",border:`1px solid ${col}28`}}>
                    <p style={{margin:0,fontSize:7,color:col,letterSpacing:0}}>{l}</p>
                    <p style={{margin:0,fontSize:14,fontWeight:900,color:col}}>{v}</p>
                  </div>
                ))}
              </div>
              {selData.nutr.kcal>0&&(
                <div style={{height:7,borderRadius:4,background:C.bg4,overflow:"hidden",display:"flex",marginBottom:8}}>
                  {[["prot",selData.nutr.prot*4,"#ef4444"],["carb",selData.nutr.carb*4,"#f59e0b"],["fat",selData.nutr.fat*9,"#3b82f6"]].map(([k,cal,col])=>(
                    <div key={k} style={{height:"100%",width:`${Math.round(cal/selData.nutr.kcal*100)||0}%`,background:col}}/>
                  ))}
                </div>
              )}
            </>
          )}

          {/* Allenamenti con pulsante elimina */}
          {selData.daySess.length>0&&(
            <div style={{marginBottom:8}}>
              <p style={{margin:"0 0 6px",fontSize:8,letterSpacing:2,color:C.text3}}>ALLENAMENTO</p>
              {selData.daySess.map((s,i)=>(
                <div key={s.id||i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:C.bg3,borderRadius:8,padding:"8px 10px",marginBottom:4,borderLeft:`2px solid ${dayColorMap[s.dayName]||"#ef4444"}`}}>
                  <div>
                    <p style={{margin:0,fontSize:12,fontWeight:700,color:C.text}}>{s.dayName}</p>
                    <p style={{margin:0,fontSize:9,color:C.text3}}>{s.duration>0?fmtDur(s.duration):""}{s.kcal>0?` · 🔥${s.kcal}kcal`:""} · {s.exercises?.length||0} esercizi</p>
                  </div>
                  <button onClick={()=>{if(window.confirm("Eliminare questo allenamento?"))deleteSession(s.id);}} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:18,padding:"0 4px",flexShrink:0}}>🗑</button>
                </div>
              ))}
            </div>
          )}

          {/* Attività extra con pulsante elimina */}
          {selData.acts.length>0&&(
            <div style={{marginBottom:8}}>
              <p style={{margin:"0 0 6px",fontSize:8,letterSpacing:2,color:C.text3}}>ATTIVITÀ</p>
              {selData.acts.map((a,i)=>(
                <div key={a.id||i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:C.bg3,borderRadius:8,padding:"7px 10px",marginBottom:3}}>
                  <span style={{fontSize:11,color:C.text2}}>{a.type} {a.kcal>0?`· ${a.kcal}kcal`:""} {fmtDur(a.min)}</span>
                  <button onClick={()=>deleteActivity(selData.ds,a.id)} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:16,padding:"0 4px",flexShrink:0}}>🗑</button>
                </div>
              ))}
            </div>
          )}

          {!selData.daySess.length&&!selData.acts.length&&!selData.nutr&&(
            <p style={{fontSize:10,color:C.text3,textAlign:"center",padding:"10px 0"}}>Nessun dato per questo giorno</p>
          )}
        </div>
      )}

      {/* Riepilogo settimana */}
      {(totKcalIn>0||totKcalOut>0)&&!selDay&&(
        <div style={{marginTop:10,borderTop:`1px solid ${C.border}`,paddingTop:8,display:"flex",gap:8,flexWrap:"wrap",justifyContent:"space-between"}}>
          <div style={{display:"flex",gap:10}}>
            {totKcalIn>0&&<div><p style={{margin:0,fontSize:7,color:C.text3}}>IN SETTIMANA</p><p style={{margin:0,fontSize:13,fontWeight:900,color:"#f97316"}}>{totKcalIn.toLocaleString()}</p></div>}
            {totKcalOut>0&&<div><p style={{margin:0,fontSize:7,color:C.text3}}>OUT</p><p style={{margin:0,fontSize:13,fontWeight:900,color:"#ef4444"}}>{totKcalOut.toLocaleString()}</p></div>}
          </div>
          {totProt>0&&<div style={{display:"flex",gap:8}}>
            <span style={{fontSize:9,color:"#ef4444",fontWeight:700}}>{totProt}g P</span>
            <span style={{fontSize:9,color:"#f59e0b",fontWeight:700}}>{totCarb}g C</span>
            <span style={{fontSize:9,color:"#3b82f6",fontWeight:700}}>{totFat}g F</span>
          </div>}
        </div>
      )}
      <div style={{display:"flex",gap:10,marginTop:8,justifyContent:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:6,height:6,borderRadius:"50%",background:"#f59e0b"}}/><span style={{fontSize:8,color:C.text3}}>surplus</span></div>
        <div style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:6,height:6,borderRadius:"50%",background:"#10b981"}}/><span style={{fontSize:8,color:C.text3}}>deficit</span></div>
        <span style={{fontSize:8,color:C.text3}}>· tocca un giorno per i dettagli</span>
      </div>
    </div>
  );
}

function FaticaCard({sessions,C,S}){
  const fi=calcFaticaIndex(sessions);
  const deload=getDeloadSuggestion(sessions);
  const statusColor={OVERREACHING:"#ef4444",["CARICO ALTO"]:"#f97316",OTTIMALE:"#10b981",FRESCO:"#3b82f6",DETRAINING:"#8b5cf6"}[fi.status]||"#6b7280";
  const tsbAbs=Math.abs(fi.tsb);
  const barW=Math.min(tsbAbs,100);
  return(
    <div style={{...S.card,marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <p style={{margin:0,fontSize:9,letterSpacing:2,color:C.text3}}>⚡ INDICE DI FATICA (ATL/CTL)</p>
        <span style={{fontSize:10,fontWeight:900,color:statusColor,background:statusColor+"18",borderRadius:6,padding:"2px 8px",letterSpacing:1}}>{fi.status}</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
        {[["ATL 7gg",fi.atl+"kg","Volume acuto giornaliero"],["CTL 28gg",fi.ctl+"kg","Carico cronico medio"],["TSB",(fi.tsb>=0?"+":"")+fi.tsb+"%","Stress balance"]].map(([l,v,sub])=>(
          <div key={l} style={{background:C.bg3,borderRadius:8,padding:"8px",textAlign:"center"}}>
            <p style={{margin:"0 0 1px",fontSize:7,color:C.text4,letterSpacing:1}}>{l}</p>
            <p style={{margin:"0 0 1px",fontSize:15,fontWeight:900,color:l==="TSB"?statusColor:C.text}}>{v}</p>
            <p style={{margin:0,fontSize:6,color:C.text4,lineHeight:1.3}}>{sub}</p>
          </div>
        ))}
      </div>
      <div style={{marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
          <span style={{fontSize:7,color:"#3b82f6"}}>FRESCO</span>
          <span style={{fontSize:7,color:"#10b981"}}>OTTIMALE</span>
          <span style={{fontSize:7,color:"#ef4444"}}>OVERREACH</span>

// ── MONTHLY COMPARE ──
// ══════════════════════════════════════════════
function MonthlyCompare({sessions,nutrEntries,tdeeEntries,actEntries,C,S}){
  const months=getMonthlyStats(sessions,nutrEntries,tdeeEntries,actEntries);
  if(months.length<2)return null;
  const monthNames=["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
  const maxVol=Math.max(...months.map(([,v])=>v.volume),1);
  const maxSess=Math.max(...months.map(([,v])=>v.sessions),1);
  const [metric,setMetric]=React.useState("volume");
  const metrics=[["volume","📦 Volume"],["sessions","🗓 Sessioni"],["duration","⏱ Tempo"],["kcalBurned","🔥 Kcal"]];
  const getValue=(v)=>({volume:v.volume,sessions:v.sessions,duration:v.duration,kcalBurned:v.kcalBurned}[metric]||0);
  const formatV=(v,m)=>{
    if(m==="volume")return v>=1000?(v/1000).toFixed(1)+"t":v+"kg";
    if(m==="sessions")return v+"";
    if(m==="duration")return fmtDur(v);
    if(m==="kcalBurned")return v>999?(v/1000).toFixed(1)+"k":v+"";
    return v+"";
  };
  const vals=months.map(([,v])=>getValue(v));
  const maxVal=Math.max(...vals,1);
  // delta mese attuale vs precedente
  const last=months[months.length-1][1];
  const prev=months[months.length-2][1];
  const delta=prev.sessions>0?Math.round((last.sessions-prev.sessions)/prev.sessions*100):null;
  const volDelta=prev.volume>0?Math.round((last.volume-prev.volume)/prev.volume*100):null;
  return(
    <div style={S.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <p style={{margin:0,fontSize:9,letterSpacing:2,color:C.text3}}>📅 CONFRONTO MENSILE</p>
        {delta!==null&&<span style={{fontSize:10,fontWeight:900,color:delta>=0?"#10b981":"#ef4444"}}>{delta>=0?"+":""}{delta}% sessioni</span>}
      </div>
      <div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}}>
        {metrics.map(([k,label])=>(
          <button key={k} onClick={()=>setMetric(k)} style={{padding:"4px 8px",borderRadius:6,border:"none",background:metric===k?"#ef4444":C.bg3,color:metric===k?"#fff":C.text3,fontSize:9,cursor:"pointer",fontFamily:"inherit",fontWeight:metric===k?700:400}}>{label}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:4,alignItems:"flex-end",height:80}}>
        {months.map(([key,v],i)=>{
          const val=getValue(v);
          const h=maxVal>0?Math.max(val/maxVal*64,val>0?4:1):1;
          const isLast=i===months.length-1;
          const mName=monthNames[parseInt(key.slice(5,7))-1];
          return(
            <div key={key} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:isLast?8:6,color:isLast?"#ef4444":C.text4,fontWeight:isLast?700:400,lineHeight:1,whiteSpace:"nowrap"}}>{formatV(val,metric)}</span>
              <div style={{width:"100%",height:h,background:isLast?"#ef4444":`#ef444455`,borderRadius:"3px 3px 0 0",transition:"height 0.5s"}}/>
              <span style={{fontSize:7,color:isLast?"#ef4444":C.text3,fontWeight:isLast?700:400}}>{mName}</span>
            </div>
          );
        })}
      </div>
      {volDelta!==null&&(
        <div style={{marginTop:8,display:"flex",gap:12,borderTop:`1px solid ${C.border}`,paddingTop:8}}>
          {[["Volume",volDelta],["Sessioni",delta]].filter(([,d])=>d!==null).map(([l,d])=>(
            <div key={l}><p style={{margin:0,fontSize:7,color:C.text4}}>{l} vs mese scorso</p><p style={{margin:0,fontSize:13,fontWeight:900,color:d>=0?"#10b981":"#ef4444"}}>{d>=0?"+":""}{d}%</p></div>
          ))}
        </div>
      )}
    </div>
  );
}

function NotificationCenter({sessions,C,S}){
  const [perm,setPerm]=React.useState(()=>typeof Notification!=='undefined'?Notification.permission:'denied');
  const [remHour,setRemHour]=React.useState(()=>db("il_notif_hour")||8);
  const [remEnabled,setRemEnabled]=React.useState(()=>db("il_notif_on")||false);
  const [lastTest,setLastTest]=React.useState(null);
  const requestPerm=async()=>{
    if(typeof Notification==='undefined')return;
    const r=await Notification.requestPermission();
    setPerm(r);
  };
  const sendTestNotif=()=>{
    if(perm!=='granted')return;
    try{new Notification('⚡ Iron Log',{body:'Notifiche attive! Ci vediamo in palestra 💪',icon:'⚡'});}catch(_){
      if(navigator.serviceWorker.controller){navigator.serviceWorker.controller.postMessage({type:'NOTIFY',title:'⚡ Iron Log',body:'Notifiche attive! 💪'});}
    }
    setLastTest(new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}));
  };
  const toggleReminder=()=>{
    const next=!remEnabled;
    setRemEnabled(next);
    db("il_notif_on",next);
    if(next&&perm==='granted'){
      sendTestNotif();
    }
  };
  const permColor={granted:"#10b981",denied:"#ef4444",default:"#f59e0b"}[perm]||"#6b7280";
  const streak=getStreak(sessions);
  return(
    <div style={S.card}>
      <p style={{margin:"0 0 12px",fontSize:9,letterSpacing:2,color:C.text3}}>🔔 NOTIFICHE & REMINDER</p>
      {/* Permission status */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:C.bg3,borderRadius:10,marginBottom:10}}>
        <div>
          <p style={{margin:"0 0 2px",fontSize:10,fontWeight:700,color:C.text}}>Permesso notifiche</p>
          <p style={{margin:0,fontSize:9,color:permColor,letterSpacing:1}}>{perm==="granted"?"✓ CONCESSO":perm==="denied"?"✗ NEGATO":"IN ATTESA"}</p>
        </div>
        {perm!=="granted"&&<button onClick={requestPerm} style={{...S.btn("red"),padding:"8px 12px",fontSize:10}}>Abilita</button>}
        {perm==="granted"&&<span style={{fontSize:20}}>✅</span>}
      </div>
      {/* Reminder toggle */}
      {perm==="granted"&&(
        <>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:C.bg3,borderRadius:10,marginBottom:8}}>
            <div>
              <p style={{margin:"0 0 2px",fontSize:10,fontWeight:700,color:C.text}}>Reminder allenamento</p>
              <p style={{margin:0,fontSize:9,color:C.text4}}>Notifica di prova all'attivazione</p>

            <div onClick={toggleReminder} style={{width:44,height:24,borderRadius:12,background:remEnabled?"#ef4444":C.bg4,cursor:"pointer",position:"relative",transition:"background 0.3s"}}>
              <div style={{position:"absolute",top:3,left:remEnabled?20:3,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left 0.3s",boxShadow:"0 2px 4px #0006"}}/>
            </div>
          </div>
          <button onClick={sendTestNotif} style={{...S.btn("ghost"),width:"100%",padding:"10px",fontSize:10,marginBottom:8}}>🔔 Invia notifica di test</button>
          {lastTest&&<p style={{margin:0,fontSize:9,color:"#10b981",textAlign:"center"}}>✓ Notifica inviata alle {lastTest}</p>}
        </>
      )}
      {/* Stats notifiche */}
      <div style={{marginTop:10,padding:"10px 12px",background:C.bg3,borderRadius:10}}>
        <p style={{margin:"0 0 6px",fontSize:8,letterSpacing:2,color:C.text4}}>STATO APP</p>
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>

            <div key={l}><p style={{margin:"0 0 1px",fontSize:7,color:C.text4}}>{l}</p><p style={{margin:0,fontSize:11,fontWeight:700,color:C.text}}>{v}</p></div>
          ))}
        </div>
      </div>
    </div>
  );
}
