                <span key={v} style={{fontSize:7,color:wilks>=v?"#fff":C.text4,fontWeight:wilks>=v?700:400}}>{v}</span>
              ))}
            </div>
            <div style={{height:8,borderRadius:4,background:`linear-gradient(90deg,#6b7280,#3b82f6 33%,#10b981 55%,#f59e0b 75%,#ef4444)`,position:"relative"}}>
              <div style={{position:"absolute",top:-3,left:`${Math.min((wilks/600)*100,97)}%`,
                width:14,height:14,borderRadius:"50%",background:"#fff",border:"3px solid "+wilksColor,
                transform:"translateX(-50%)",boxShadow:"0 2px 8px #0008",transition:"left 0.8s"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
              {["Princ.","Novice","Inter.","Avanz.","Elite"].map((l,i)=>(
                <span key={l} style={{fontSize:6,color:C.text4,flex:1,textAlign:i===0?"left":i===4?"right":"center"}}>{l}</span>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Per-exercise standards */}
      {liftsWithData.length>0&&(
        <div style={S.card}>
          <p style={{margin:"0 0 10px",fontSize:9,letterSpacing:2,color:C.text3}}>STRENGTH STANDARDS PER ESERCIZIO</p>
          {liftsWithData.map(name=>{
            const rec=records[name];
            const std=getStrengthStd(name,rec.orm,bwKg,gender==="m");
            if(!std)return(
              <div key={name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid "+C.border}}>
                <span style={{fontSize:10,color:C.text2}}>{name}</span>
                <span style={{fontSize:10,fontWeight:700,color:"#ef4444"}}>{rec.orm}kg 1RM</span>
                <span style={{fontSize:8,color:C.text4}}>Inserisci BW</span>
              </div>
            );
            const pct=std.next?Math.min(std.ratio/std.next*100,100):100;
            return(
              <div key={name} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <span style={{fontSize:10,fontWeight:700,color:C.text}}>{name}</span>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:10,fontWeight:900,color:C.text3}}>{rec.orm}kg</span>
                    <span style={{fontSize:9,fontWeight:700,color:std.color,background:std.color+"18",borderRadius:5,padding:"2px 8px"}}>{std.label}</span>
                  </div>
                </div>
                <div style={{height:6,borderRadius:3,background:C.bg4,overflow:"hidden"}}>
                  <div style={{height:"100%",width:pct+"%",background:`linear-gradient(90deg,${std.color}88,${std.color})`,borderRadius:3,transition:"width 0.6s"}}/>
                </div>
                {std.next&&<p style={{margin:"3px 0 0",fontSize:7,color:C.text4}}>Prossimo livello: {Math.round(std.next*bwKg)}kg ({std.ratio}× BW → {std.next}×)</p>}
              </div>
            );
          })}
          {!bwKg&&<p style={{margin:"8px 0 0",fontSize:9,color:"#f97316",textAlign:"center"}}>⚠ Inserisci il tuo peso corporeo nella tab Fisico per vedere i livelli</p>}
        </div>
      )}

      {/* Push/Pull balance */}
      {pp&&(
        <div style={S.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <p style={{margin:0,fontSize:9,letterSpacing:2,color:C.text3}}>PUSH / PULL BALANCE (4 settimane)</p>
            <span style={{fontSize:9,fontWeight:700,
              color:pp.status==="BILANCIATO"?"#10b981":pp.status==="PULL DOMINANTE"?"#3b82f6":"#f97316",
              background:(pp.status==="BILANCIATO"?"#10b981":pp.status==="PULL DOMINANTE"?"#3b82f6":"#f97316")+"18",
              borderRadius:5,padding:"2px 8px",letterSpacing:0.5}}>{pp.status}</span>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            {[["🔴 PUSH",pp.pushVol,pp.pushPct,"#ef4444"],["🔵 PULL",pp.pullVol,pp.pullPct,"#3b82f6"]].map(([l,v,pct,col])=>(
              <div key={l} style={{flex:1,background:C.bg3,borderRadius:10,padding:"10px",textAlign:"center"}}>
                <p style={{margin:"0 0 2px",fontSize:9,color:col,fontWeight:700}}>{l}</p>
                <p style={{margin:"0 0 1px",fontSize:16,fontWeight:900,color:C.text}}>{v>=1000?(v/1000).toFixed(1)+"t":v+"kg"}</p>
                <p style={{margin:0,fontSize:11,color:C.text3}}>{pct}%</p>
              </div>
            ))}
          </div>
          <div style={{height:10,borderRadius:5,background:C.bg4,overflow:"hidden",display:"flex"}}>
            <div style={{width:pp.pushPct+"%",background:"#ef4444",transition:"width 0.6s"}}/>
            <div style={{flex:1,background:"#3b82f6"}}/>
          </div>
          {pp.ratio&&(
            <p style={{margin:"6px 0 0",fontSize:9,color:C.text3}}>
              Rapporto Push:Pull = <strong style={{color:pp.ratio>=0.8&&pp.ratio<=1.3?"#10b981":"#f97316"}}>{pp.ratio}:1</strong>
              {" "}(ideale: 0.8–1.2)
            </p>
          )}
        </div>
      )}
    </div>
  );
}

// ── SMART TDEE CARD ──
// ══════════════════════════════════════════════
function SmartTDEECard({sessions,bwEntries,actEntries,nutrEntries,C,S}){
  const [age,setAge]=React.useState(()=>db("il_age")||25);
  const [height,setHeight]=React.useState(()=>db("il_height")||175);
  const [gender,setGender]=React.useState(()=>db("il_gender")||"m");
  const lastBw=bwEntries&&bwEntries.length?bwEntries[bwEntries.length-1]:null;
  const bwKg=lastBw?lastBw.w:null;
  const bmr=calcBMR(bwKg,height,age,gender==="m");
  const tdeeData=calcSmartTDEE(bmr,sessions,actEntries);
  const save=()=>{db("il_age",age);db("il_height",height);};

  return(
    <div style={{...S.card,marginBottom:10}}>
      <p style={{margin:"0 0 10px",fontSize:9,letterSpacing:2,color:C.text3}}>🧮 TDEE INTELLIGENTE (Mifflin-St Jeor)</p>
      {/* Inputs */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
        <div>
          <label style={{fontSize:8,color:C.text4,letterSpacing:1,display:"block",marginBottom:3}}>ETÀ</label>
          <input type="number" inputMode="numeric" value={age} onBlur={save}
            onChange={e=>{setAge(parseInt(e.target.value)||25);}}
            style={{width:"100%",background:C.bg3,border:"1px solid "+C.border2,borderRadius:8,padding:"8px 10px",
              color:C.text,fontSize:16,fontFamily:"inherit",outline:"none",textAlign:"center",fontWeight:700}}/>
        </div>
        <div>
          <label style={{fontSize:8,color:C.text4,letterSpacing:1,display:"block",marginBottom:3}}>ALTEZZA (cm)</label>
          <input type="number" inputMode="numeric" value={height} onBlur={save}
            onChange={e=>{setHeight(parseInt(e.target.value)||175);}}
            style={{width:"100%",background:C.bg3,border:"1px solid "+C.border2,borderRadius:8,padding:"8px 10px",
              color:C.text,fontSize:16,fontFamily:"inherit",outline:"none",textAlign:"center",fontWeight:700}}/>
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        {[["m","♂"],["f","♀"]].map(([k,l])=>(
          <button key={k} onClick={()=>{setGender(k);db("il_gender",k);}}
            style={{flex:1,padding:"7px",borderRadius:8,border:"none",
              background:gender===k?"#ef4444":C.bg3,color:gender===k?"#fff":C.text3,
              fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:gender===k?700:400}}>
            {l}
          </button>
        ))}
      </div>

      {bmr?(
        <>
          {/* BMR */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
            background:C.bg3,borderRadius:10,padding:"10px 12px",marginBottom:8}}>
            <div>
              <p style={{margin:"0 0 1px",fontSize:8,color:C.text4,letterSpacing:1}}>BMR (a riposo totale)</p>
              <p style={{margin:0,fontSize:7,color:C.text4}}>Calorie bruciate senza fare nulla</p>
            </div>
            <p style={{margin:0,fontSize:20,fontWeight:900,color:C.text}}>{bmr} <span style={{fontSize:10,color:C.text4}}>kcal</span></p>
          </div>
          {tdeeData&&(
            <>
              {/* TDEE */}
              <div style={{background:`linear-gradient(135deg,#ef444418,#f9731618)`,border:"1px solid #ef444430",
                borderRadius:12,padding:"12px 14px",marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <div>
                    <p style={{margin:"0 0 1px",fontSize:9,letterSpacing:2,color:"#ef4444"}}>TDEE CALCOLATO</p>
                    <p style={{margin:0,fontSize:7,color:C.text4}}>Basato su {tdeeData.wkFreq} allenamenti/settimana (4w)</p>
                  </div>
                  <p style={{margin:0,fontSize:28,fontWeight:900,color:"#ef4444"}}>{tdeeData.tdee}</p>
                </div>
                <p style={{margin:0,fontSize:8,color:C.text3}}>Moltiplicatore attività: <strong style={{color:"#ef4444"}}>{tdeeData.mult}x</strong></p>
              </div>
              {/* Goals */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                {[["🏗 Bulk",tdeeData.bulk,"#10b981","deficit+300"],
                  ["⚖️ Maintain",tdeeData.maintain,"#3b82f6",""],
                  ["✂️ Cut",tdeeData.cut,"#ef4444","-500"]].map(([l,v,col,sub])=>(
                  <div key={l} style={{background:C.bg3,borderRadius:10,padding:"10px 6px",textAlign:"center",border:"1px solid "+col+"33"}}>
                    <p style={{margin:"0 0 2px",fontSize:9,color:col,fontWeight:700}}>{l}</p>
                    <p style={{margin:"0 0 1px",fontSize:16,fontWeight:900,color:C.text}}>{v}</p>
                    <p style={{margin:0,fontSize:7,color:C.text4}}>kcal/giorno</p>
                  </div>
                ))}
              </div>
            </>
          )}
          {!bwKg&&<p style={{margin:"8px 0 0",fontSize:9,color:"#f97316",textAlign:"center"}}>⚠ Inserisci il peso corporeo nella tab Fisico per il calcolo TDEE</p>}
        </>
      ):(
        <p style={{textAlign:"center",color:C.text4,fontSize:10,padding:"16px 0"}}>Inserisci età, altezza e peso corporeo per calcolare il TDEE</p>
      )}
    </div>
  );
}

// ── CARB CYCLING CARD ──
// ══════════════════════════════════════════════
function CarbCyclingCard({nutrEntries,sessions,bwEntries,actEntries,C,S}){
  const [age]=React.useState(()=>db("il_age")||25);
  const [height]=React.useState(()=>db("il_height")||175);
  const [gender]=React.useState(()=>db("il_gender")||"m");
  const lastBw=bwEntries&&bwEntries.length?bwEntries[bwEntries.length-1]:null;
  const bwKg=lastBw?lastBw.w:null;
  const bmr=calcBMR(bwKg,height,age,gender==="m");
  const tdeeData=calcSmartTDEE(bmr,sessions,actEntries);
  const cc=getCarbCycling(nutrEntries,sessions,tdeeData?tdeeData.tdee:null);
  const pts=getProteinTimingScore(nutrEntries,sessions);

  if(!cc)return(
    <div style={{...S.card,textAlign:"center",padding:"20px 12px",marginBottom:10}}>
      <p style={{fontSize:24,margin:"0 0 8px"}}>🔄</p>
      <p style={{fontSize:10,color:C.text3}}>Registra almeno 5 giorni di nutrizione e configura il TDEE per le raccomandazioni carb cycling.</p>
    </div>
  );

  const trainDates=new Set(sessions.map(s=>s.date));
  const lastDays=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-i);
    return d.toISOString().slice(0,10);
  }).reverse();

  return(
    <div style={{marginBottom:10}}>
      <div style={{...S.card,marginBottom:10}}>
        <p style={{margin:"0 0 10px",fontSize:9,letterSpacing:2,color:C.text3}}>🔄 CARB CYCLING PROTOCOL</p>
        <div style={{background:"#3b82f618",border:"1px solid #3b82f630",borderRadius:10,padding:"10px 12px",marginBottom:10}}>
          <p style={{margin:"0 0 6px",fontSize:9,fontWeight:700,color:"#3b82f6",letterSpacing:1}}>💡 RACCOMANDAZIONE</p>
          <p style={{margin:0,fontSize:10,color:C.text2,lineHeight:1.5}}>{cc.recommendation}</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          {[
            ["🏋️ GIORNO ALLENAMENTO",cc.highCarbKcal,cc.highCarb,cc.highProt,"#ef4444"],
            ["😴 GIORNO RIPOSO",cc.lowCarbKcal,cc.lowCarb,cc.lowProt,"#3b82f6"],
          ].map(([label,kcal,carb,prot,col])=>(
            <div key={label} style={{background:C.bg3,borderRadius:12,padding:"12px 10px",border:"1px solid "+col+"33"}}>
              <p style={{margin:"0 0 8px",fontSize:8,color:col,fontWeight:700,letterSpacing:0.5}}>{label}</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
                {[["Kcal",kcal,"#f97316"],["Carb",carb+"g","#f59e0b"],["Prot",prot+"g","#10b981"]].map(([l,v,c])=>(
                  <div key={l} style={{textAlign:"center"}}>
                    <p style={{margin:"0 0 1px",fontSize:7,color:C.text4}}>{l}</p>
                    <p style={{margin:0,fontSize:13,fontWeight:900,color:c}}>{v}</p>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
        {/* 7-day plan */}
        <p style={{margin:"0 0 6px",fontSize:8,letterSpacing:2,color:C.text4}}>PIANO 7 GIORNI</p>
        <div style={{display:"flex",gap:3}}>
          {lastDays.map(d=>{
            const isTrain=trainDates.has(d);
            const dow=["L","M","M","G","V","S","D"][(new Date(d).getDay()+6)%7];
            const isToday=d===new Date().toISOString().slice(0,10);
            return(
              <div key={d} style={{flex:1,textAlign:"center"}}>
                <div style={{width:"100%",paddingBottom:"100%",borderRadius:8,position:"relative",
                  background:isTrain?"#ef444433":"#3b82f633",
                  border:isToday?"2px solid "+(isTrain?"#ef4444":"#3b82f6"):"2px solid transparent"}}>
                  <span style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",
                    fontSize:11}}>{isTrain?"🏋":"😴"}</span>
                </div>
                <p style={{margin:"3px 0 0",fontSize:7,color:isToday?C.text:C.text4,fontWeight:isToday?700:400}}>{dow}</p>
                <p style={{margin:0,fontSize:6,color:isTrain?"#ef4444":"#3b82f6",fontWeight:700}}>{isTrain?"HIGH":"LOW"}</p>
              </div>
            );
          })}
        </div>
      </div>

      {/* Protein timing */}
      {pts!==null&&(
        <div style={S.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <p style={{margin:0,fontSize:9,letterSpacing:2,color:C.text3}}>⏰ PROTEIN TIMING SCORE</p>
            <span style={{fontSize:18,fontWeight:900,color:pts>=70?"#10b981":pts>=40?"#f59e0b":"#ef4444"}}>{pts}/100</span>
          </div>
          <div style={{height:8,borderRadius:4,background:C.bg4,overflow:"hidden",marginBottom:8}}>
            <div style={{height:"100%",width:pts+"%",background:pts>=70?"#10b981":pts>=40?"#f59e0b":"#ef4444",
              borderRadius:4,transition:"width 0.7s"}}/>
          </div>
          <p style={{margin:0,fontSize:9,color:C.text3,lineHeight:1.5}}>
            {pts>=70?"Ottima distribuzione proteica! Stai massimizzando la sintesi proteica muscolare.":
             pts>=40?"Distribuzione discreta. Prova a mantenere le proteine costanti fra 120–160g/giorno.":
             "Assunzione proteica irregolare. La consistenza è fondamentale per la composizione corporea."}
          </p>
        </div>
      )}
    </div>
  );
}

// ── VOLUME LANDMARKS PANEL ──
// ══════════════════════════════════════════════
function VolumeLandmarkPanel({sessions,C,S}){
  const avg = getWeeklySetsByMuscle(sessions, 4);
  const muscles = MUSCLE_GROUPS.filter(m => VOLUME_LANDMARKS[m]);
  return(
    <div style={S.card}>
      <p style={{margin:"0 0 4px",fontSize:9,letterSpacing:2,color:C.text3}}>📊 VOLUME LANDMARKS — SERIE/SETTIMANA (media 4w)</p>
      <p style={{margin:"0 0 12px",fontSize:8,color:C.text4}}>MEV = Minimo Efficace · MAV = Massimo Adattativo · MRV = Massimo Recuperabile</p>
      {muscles.map(m => {
        const lm = VOLUME_LANDMARKS[m];
        const s = avg[m] || 0;
        const st = getVolumeStatus(m, s);
        const barW = st ? Math.min(st.pct, 100) : 0;
        return(
          <div key={m} style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
              <span style={{fontSize:10,fontWeight:700,color:MUSCLE_COLORS[m]}}>{m}</span>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:11,fontWeight:900,color:C.text}}>{s} serie/w</span>
                <span style={{fontSize:8,fontWeight:700,padding:"2px 7px",borderRadius:5,
                  background:st?st.color+"22":"transparent",color:st?st.color:C.text4}}>
                  {st?st.zone:"N/D"}
                </span>
              </div>
            </div>
            <div style={{position:"relative",height:8,borderRadius:4,background:C.bg4,overflow:"visible"}}>
              <div style={{height:"100%",width:barW+"%",background:st?st.color:"#374151",borderRadius:4,transition:"width 0.7s"}}/>
              {[lm.mev,lm.mav,lm.mrv].map((v,i)=>{
                const x = Math.min(v/lm.mrv*100, 100);
                const labels=["MEV","MAV","MRV"];
                const cols=["#ef4444","#f59e0b","#8b5cf6"];
                return(
                  <div key={i} style={{position:"absolute",top:-2,left:x+"%",
                    width:2,height:12,background:cols[i],borderRadius:1,transform:"translateX(-50%)"}}/>
                );
              })}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
              {[["MEV",lm.mev,"#ef4444"],["MAV",lm.mav,"#f59e0b"],["MRV",lm.mrv,"#8b5cf6"]].map(([l,v,c])=>(
                <span key={l} style={{fontSize:7,color:s>=v?c:C.text4}}>
                  {l}: {v}
                </span>
              ))}
            </div>
          </div>
        );
      })}
      {(()=>{
        const deficits = muscles.filter(m => (avg[m]||0) < VOLUME_LANDMARKS[m].mev);
        if (!deficits.length) return(
          <div style={{background:"#10b98118",border:"1px solid #10b98130",borderRadius:8,padding:"8px 12px",marginTop:4}}>
            <p style={{margin:0,fontSize:9,color:"#10b981"}}>✅ Tutti i muscoli sopra MEV questa settimana!</p>
          </div>
        );
        return(
          <div style={{background:"#ef444418",border:"1px solid #ef444430",borderRadius:8,padding:"8px 12px",marginTop:4}}>

function PlateauProjectionPanel({sessions,C,S}){
  const records = getRecords(sessions);

  const [selEx, setSelEx] = React.useState(mainLifts[0]||"");

    <div style={{...S.card,textAlign:"center",padding:"20px 12px"}}>
      <p style={{fontSize:10,color:C.text3}}>Registra almeno 4 sessioni per vedere le proiezioni.</p>
    </div>
  );
  const plateau = selEx ? detectPlateau(selEx, sessions) : null;
  const proj    = selEx ? getORMProjection(selEx, sessions) : null;
  return(
    <div style={S.card}>
      <p style={{margin:"0 0 10px",fontSize:9,letterSpacing:2,color:C.text3}}>📈 PLATEAU DETECTOR + PROIEZIONE 1RM</p>

          <button key={n} onClick={()=>setSelEx(n)}
            style={{padding:"5px 10px",borderRadius:8,border:"none",fontSize:9,cursor:"pointer",fontFamily:"inherit",

            {n}
          </button>
        ))}
      </div>
      {plateau&&(
        <div style={{background:plateau.isPlateau?"#ef444418":"#10b98118",
          border:"1px solid "+(plateau.isPlateau?"#ef444430":"#10b98130"),
          borderRadius:10,padding:"10px 12px",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <p style={{margin:"0 0 2px",fontSize:10,fontWeight:700,
                color:plateau.isPlateau?"#ef4444":"#10b981"}}>
                {plateau.isPlateau?"🔴 PLATEAU RILEVATO":"🟢 PROGRESSIONE OK"}
              </p>
              <p style={{margin:0,fontSize:8,color:C.text4}}>
                Ultime {plateau.sessions} sessioni · variazione: {plateau.variance}kg
              </p>
            </div>
            <div style={{textAlign:"right"}}>
              <p style={{margin:0,fontSize:18,fontWeight:900,color:C.text}}>{plateau.maxW}kg</p>
              <p style={{margin:0,fontSize:8,color:C.text4}}>1RM massimo recente</p>
            </div>
          </div>
          {plateau.isPlateau&&(
            <p style={{margin:"8px 0 0",fontSize:9,color:C.text2,lineHeight:1.5}}>
              💡 Strategie: deload 1 settimana, cambia rep range, aumenta volume prima di peso, prova variante esercizio.
            </p>
          )}
        </div>
      )}
      {proj?(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <p style={{margin:0,fontSize:9,color:C.text3}}>Progressione lineare (R²={proj.r2}%)</p>
            <span style={{fontSize:9,color:proj.weeklyGain>=0?"#10b981":"#ef4444",fontWeight:700}}>
              {proj.weeklyGain>=0?"+":""}{proj.weeklyGain} kg/settimana
            </span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            {proj.projections.map(p=>(
              <div key={p.weeks} style={{background:C.bg3,borderRadius:10,padding:"10px 8px",textAlign:"center",
                border:"1px solid "+(p.orm>proj.currentOrm?"#10b98130":C.border)}}>
                <p style={{margin:"0 0 2px",fontSize:8,color:C.text4}}>+{p.weeks} settimane</p>
                <p style={{margin:"0 0 1px",fontSize:18,fontWeight:900,
                  color:p.orm>proj.currentOrm?"#10b981":"#ef4444"}}>{p.orm}kg</p>
                <p style={{margin:0,fontSize:8,color:C.text3}}>1RM stimato</p>
                {p.orm>proj.currentOrm&&(
                  <p style={{margin:"3px 0 0",fontSize:7,color:"#10b981"}}>
                    +{p.orm-proj.currentOrm}kg
                  </p>
                )}
              </div>
            ))}
          </div>
          {proj.r2<40&&(
            <p style={{margin:"8px 0 0",fontSize:8,color:"#f97316"}}>
              ⚠ R²={proj.r2}% — progressione irregolare, la proiezione è indicativa.
            </p>
          )}
        </div>
      ):(
        <p style={{fontSize:9,color:C.text4,textAlign:"center",padding:"8px 0"}}>
          Servono almeno 4 sessioni su questo esercizio per la proiezione.
        </p>
      )}
    </div>
  );
}

function Confetti(){
  const pieces=Array.from({length:28},(_,i)=>({
    id:i,
    color:["#ef4444","#f59e0b","#10b981","#3b82f6","#8b5cf6","#ec4899","#f97316"][i%7],
    left:Math.random()*100,
    delay:Math.random()*1.2,
    duration:1.8+Math.random()*1.2,
    size:6+Math.random()*8,
    shape:i%3===0?"circle":i%3===1?"square":"triangle",
  }));
  return(
    <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:9999,overflow:"hidden"}}>
      {pieces.map(p=>(
        <div key={p.id} style={{
          position:"absolute",top:-20,left:`${p.left}%`,
          width:p.size,height:p.size,
          background:p.shape==="triangle"?"transparent":p.color,
          borderRadius:p.shape==="circle"?"50%":p.shape==="square"?"3px":"0",
          borderLeft:p.shape==="triangle"?`${p.size/2}px solid transparent`:"none",
          borderRight:p.shape==="triangle"?`${p.size/2}px solid transparent`:"none",
          borderBottom:p.shape==="triangle"?`${p.size}px solid ${p.color}`:"none",
          animation:`confettiFall ${p.duration}s ${p.delay}s ease-in forwards`,
        }}/>
      ))}
    </div>
  );
}

function FinishPage({C,S,workoutStart,program,activeDay,logData,sessionsRef,onDone}){
  const [dur,setDur]=useState(()=>String(workoutStart?Math.round((Date.now()-workoutStart)/60000):0));
  const [kcal,setKcal]=useState("");
  const [note,setNote]=useState("");
  const [saved,setSaved]=useState(false);
  const [showConfetti,setShowConfetti]=useState(true);
  useEffect(()=>{const t=setTimeout(()=>setShowConfetti(false),3200);return()=>clearTimeout(t);},[]);
  const day=program.days[activeDay];
  const totalExercises=day.exercises.length;
  const loggedCount=day.exercises.filter(ex=>logData[ex.name]?.weight>0).length;
  const completionPct=totalExercises>0?Math.round((loggedCount/totalExercises)*100):100;
  const save=()=>{
    const exercises=day.exercises.map(ex=>{
      const d=logData[ex.name]||{};
      return{name:ex.name,muscle:ex.muscle,sets:ex.sets,weight:parseFloat(d.weight)||0,reps:parseInt(d.reps)||ex.minReps,score:d.score||3,note:d.note||""};
    });
    const sess={id:Date.now(),date:todayISO(),dayName:day.name,exercises,duration:parseInt(dur)||0,kcal:parseInt(kcal)||0,note};
    const updated=[...sessionsRef.current,sess];
    sessionsRef.current=updated;db(SESS_KEY,updated);setSaved(true);setTimeout(()=>onDone(updated,exercises),400);
  };
  const iD=parseInt(dur)||0,iK=parseInt(kcal)||0;
  const emoji=completionPct===100?"🏆":completionPct>=80?"💪":completionPct>=50?"⚡":"🔥";
  const msg=completionPct===100?"ALLENAMENTO COMPLETO!":completionPct>=80?"QUASI PERFETTO!":"OTTIMO LAVORO!";
  return(
    <div style={S.app}>
      {showConfetti&&<Confetti/>}
      <div style={{...S.wrap,paddingTop:24}}>
        <div style={{textAlign:"center",marginBottom:20,animation:"fadeUp 0.5s ease forwards"}}>
          <div style={{fontSize:52,margin:"0 0 8px",lineHeight:1,filter:"drop-shadow(0 0 20px #ef444480)"}}>{emoji}</div>
          <p style={{fontSize:22,letterSpacing:3,fontWeight:900,margin:"0 0 6px",color:C.text}}>{msg}</p>
          <p style={{fontSize:11,color:C.text3,margin:"0 0 16px"}}>
            {completionPct===100?`Tutti e ${totalExercises} esercizi completati`:`${loggedCount}/${totalExercises} esercizi completati`}
          </p>
          {/* Completion ring */}
          <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",position:"relative",width:88,height:88,marginBottom:8}}>
            <svg width={88} height={88} style={{transform:"rotate(-90deg)",position:"absolute"}}>
              <circle cx={44} cy={44} r={36} fill="none" stroke={C.bg4} strokeWidth={7}/>
              <circle cx={44} cy={44} r={36} fill="none" stroke={completionPct===100?"#f59e0b":"#ef4444"} strokeWidth={7}
                strokeDasharray={2*Math.PI*36} strokeDashoffset={2*Math.PI*36*(1-completionPct/100)}
                strokeLinecap="round" style={{transition:"stroke-dashoffset 1s ease"}}/>
            </svg>
            <span style={{fontSize:18,fontWeight:900,color:completionPct===100?"#f59e0b":"#ef4444",position:"relative"}}>{completionPct}%</span>
          </div>
        </div>

        <div style={{...S.card,borderLeft:`3px solid ${completionPct===100?"#f59e0b":"#ef4444"}`}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
            <div>
              <label style={S.lbl}>⏱ Durata (minuti)</label>
              <input type="number" inputMode="numeric" style={{...S.inp,fontSize:28,fontWeight:900,textAlign:"center",padding:"14px 8px"}} value={dur} onChange={e=>setDur(e.target.value)} placeholder="65"/>
              {iD>0&&<p style={{margin:"4px 0 0",fontSize:9,color:C.text3,textAlign:"center"}}>{fmtDur(iD)}</p>}
            </div>
            <div>
              <label style={S.lbl}>🔥 Calorie (kcal)</label>
              <input type="number" inputMode="numeric" style={{...S.inp,fontSize:28,fontWeight:900,textAlign:"center",padding:"14px 8px"}} value={kcal} onChange={e=>setKcal(e.target.value)} placeholder="400"/>
              {iK>0&&iD>0&&<p style={{margin:"4px 0 0",fontSize:9,color:"#f97316",textAlign:"center"}}>{(iK/iD).toFixed(0)} kcal/min</p>}
            </div>
          </div>
          {(iD>0||iK>0)&&(
            <div style={{background:C.bg3,borderRadius:10,padding:"10px",marginBottom:12,display:"flex",gap:16,justifyContent:"center"}}>
              {iD>0&&<div style={{textAlign:"center"}}><p style={{margin:0,fontSize:8,color:C.text3}}>DURATA</p><p style={{margin:0,fontSize:16,fontWeight:900,color:C.text}}>{fmtDur(iD)}</p></div>}
              {iK>0&&<div style={{textAlign:"center"}}><p style={{margin:0,fontSize:8,color:C.text3}}>CALORIE</p><p style={{margin:0,fontSize:16,fontWeight:900,color:"#f97316"}}>{iK} kcal</p></div>}
              {iD>0&&iK>0&&<div style={{textAlign:"center"}}><p style={{margin:0,fontSize:8,color:C.text3}}>RITMO</p><p style={{margin:0,fontSize:16,fontWeight:900,color:"#8b5cf6"}}>{(iK/iD).toFixed(0)} kcal/min</p></div>}
            </div>
          )}
          <label style={S.lbl}>📝 Come è andata?</label>
          <input style={{...S.inp,fontSize:14}} placeholder="Sonno, energia, sensazioni..." value={note} onChange={e=>setNote(e.target.value)}/>
        </div>

        <button
          style={{...S.btn("red"),width:"100%",padding:16,fontSize:15,letterSpacing:3,marginBottom:8,
            background:saved?"#10b981":"linear-gradient(135deg,#ef4444,#dc2626)",
            backgroundSize:"200% auto",transition:"all 0.3s",
            boxShadow:saved?"0 4px 20px #10b98150":"0 4px 20px #ef444450",
          }}
          onClick={save} disabled={saved}>
          {saved?"✓ SALVATO!":"💾 SALVA ALLENAMENTO"}
        </button>
        <button style={{...S.btn("ghost"),width:"100%",padding:12,fontSize:11}} onClick={save}>Salta statistiche</button>
      </div>
    </div>
  );
}

function GymTracker(){
  const [view,setView]=useState("loading");
  const [program,setProgram]=useState(null);
  const [sessions,setSessions]=useState([]);
  const [activeDay,setActiveDay]=useState(null);
  const [logData,setLogData]=useState({});
  const [toast,setToast]=useState(null);
  const [newPR,setNewPR]=useState(null);
  const [themePrefs,setThemePrefs]=useState(()=>loadThemePrefs());
  const [workoutStart,setWorkoutStart]=useState(null);
  const [goals,setGoals]=useState({});
  const [nutrEntries,setNutrEntries]=useState({});
  const [actEntries,setActEntries]=useState({});
  const [tdeeEntries,setTdeeEntries]=useState({});
  const [bwEntries,setBwEntries]=useState([]);
  const [calOffset,setCalOffset]=useState(0);
  const [editingSession,setEditingSession]=useState(null);
  const sessionsRef=useRef([]);

  const updateSessions=(val)=>{sessionsRef.current=val;setSessions(val);};

  useEffect(()=>{
    const p=db(PROG_KEY),s=db(SESS_KEY),th=db(THEME_KEY),g=db(GOALS_KEY);
    const n=db(NUTR_KEY),a=db(ACT_KEY),td=db(TDEE_KEY),bw=db(BW_KEY);
    if(Array.isArray(s)&&s.length)updateSessions(s);
    if(p?.days?.length){setProgram(p);setView("workout");}else setView("setup");
    const tp=db(THEME_STORAGE_KEY); if(tp){try{setThemePrefs(JSON.parse(tp));}catch(_){}}
    if(g)setGoals(g);
    if(n)setNutrEntries(n);
    if(a)setActEntries(a);
    if(td)setTdeeEntries(td);
    if(Array.isArray(bw)&&bw.length)setBwEntries(bw);
  },[]);

  const toggleTheme=()=>{
    const modes=Object.keys(THEME_MODES);
    const cur=themePrefs.mode||"dark_pure";
    const next=modes[(modes.indexOf(cur)+1)%modes.length];
    const np={...themePrefs,mode:next};
    setThemePrefs(np);saveThemePrefs(np);
  };
  const notify=(msg,col="#10b981")=>{setToast({msg,col});setTimeout(()=>setToast(null),2500);};
  const saveProgram=(p)=>{setProgram(p);db(PROG_KEY,p);notify("Programma salvato! 💪");setView("workout");};
  const startWorkout=(di)=>{setActiveDay(di);setLogData({});setWorkoutStart(Date.now());setView("log");};
  const setGoal=(name,kg)=>{const g={...goals,[name]:kg};setGoals(g);db(GOALS_KEY,g);};
  const dl=(content,filename,type="text/plain")=>{const b=new Blob([content],{type});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=filename;a.click();URL.revokeObjectURL(a.href);};
  const csvRow=(...cols)=>cols.map(c=>{const s=String(c??'');return s.includes(',')||s.includes('"')||s.includes('\n')?`"${s.replace(/"/g,'""')}"`:`${s}`;}).join(',')+'\n';

  const exportAllJSON=()=>{
    const payload={exportDate:todayISO(),version:2,program,sessions,bwEntries,nutrEntries,actEntries,tdeeEntries,goals};
    dl(JSON.stringify(payload,null,2),`ironlog_backup_${todayISO()}.json`,"application/json");
    notify("Backup JSON esportato ✓");
  };
  const exportSessionsCSV=()=>{
    let csv=csvRow("data","giorno","durata_min","kcal_allenamento","note","esercizio","gruppo_muscolare","kg","reps","score","sets");
    sessions.forEach(s=>s.exercises.forEach(e=>{csv+=csvRow(s.date,s.dayName,s.duration||0,s.kcal||0,s.note||"",e.name,e.muscle,e.weight,e.reps,e.score,e.sets||1);}));
    dl(csv,`ironlog_allenamenti_${todayISO()}.csv`,"text/csv;charset=utf-8");
    notify("CSV allenamenti esportato ✓");
  };
  const exportBodyCSV=()=>{
    let csv=csvRow("data","peso_kg","grasso_%","massa_magra_kg","bmi");
    bwEntries.forEach(e=>{csv+=csvRow(e.date,e.w,e.fat??'',e.lean??'',e.bmi??'');});
    dl(csv,`ironlog_corpo_${todayISO()}.csv`,"text/csv;charset=utf-8");
    notify("CSV corporeo esportato ✓");
  };
  const exportNutrCSV=()=>{
    let csv=csvRow("data","kcal","proteine_g","carboidrati_g","grassi_g");
    Object.entries(nutrEntries).sort().forEach(([date,n])=>{csv+=csvRow(date,n.kcal,n.prot,n.carb,n.fat);});
    dl(csv,`ironlog_nutrizione_${todayISO()}.csv`,"text/csv;charset=utf-8");
    notify("CSV nutrizione esportato ✓");
  };
  const exportCalCSV=()=>{
    const allDates=[...new Set([...Object.keys(nutrEntries),...Object.keys(tdeeEntries)])].sort();
    let csv=csvRow("data","kcal_assunte","kcal_bruciate","bilancio","surplus_deficit");
    allDates.forEach(date=>{
      const kcalIn=nutrEntries[date]?.kcal||0;
      const kcalOut=tdeeEntries[date]||0;
      const bal=kcalIn&&kcalOut?kcalIn-kcalOut:'';
      const label=bal===''?'':(bal>0?'surplus':'deficit');
      csv+=csvRow(date,kcalIn||'',kcalOut||'',bal,label);
    });
    dl(csv,`ironlog_bilancio_${todayISO()}.csv`,"text/csv;charset=utf-8");
    notify("CSV bilancio esportato ✓");
  };
  const exportActivitiesCSV=()=>{
    let csv=csvRow("data","tipo","kcal","minuti");
    Object.entries(actEntries).sort().forEach(([date,acts])=>acts.forEach(a=>{csv+=csvRow(date,a.type,a.kcal||0,a.min||0);}));
    dl(csv,`ironlog_attivita_${todayISO()}.csv`,"text/csv;charset=utf-8");
    notify("CSV attività esportato ✓");
  };
  const importJSON=(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.sessions&&Array.isArray(data.sessions)){updateSessions(data.sessions);db(SESS_KEY,data.sessions);}
        if(data.program?.days?.length){setProgram(data.program);db(PROG_KEY,data.program);}
        if(data.bwEntries&&Array.isArray(data.bwEntries)){setBwEntries(data.bwEntries);db(BW_KEY,data.bwEntries);}
        if(data.nutrEntries&&typeof data.nutrEntries==='object'){setNutrEntries(data.nutrEntries);db(NUTR_KEY,data.nutrEntries);}
        if(data.actEntries&&typeof data.actEntries==='object'){setActEntries(data.actEntries);db(ACT_KEY,data.actEntries);}
        if(data.tdeeEntries&&typeof data.tdeeEntries==='object'){setTdeeEntries(data.tdeeEntries);db(TDEE_KEY,data.tdeeEntries);}
        if(data.goals&&typeof data.goals==='object'){setGoals(data.goals);db(GOALS_KEY,data.goals);}
        notify("Dati importati con successo ✓","#10b981");
      }catch(_){notify("Errore: file non valido","#ef4444");}
    };
    reader.readAsText(file);
    e.target.value='';
  };

  const handleFinish=(updated,exercises)=>{
    const prevRec=getRecords(sessionsRef.current.slice(0,-1));
    exercises.forEach(e=>{if(!prevRec[e.name]||e.weight>prevRec[e.name].weight){setNewPR({name:e.name,weight:e.weight});setTimeout(()=>setNewPR(null),3500);}});
    updateSessions(updated);
    setActiveDay(null);setLogData({});setWorkoutStart(null);
    notify("Allenamento salvato! 🔥");setView("workout");
  };

  const saveEditedSession=(updated)=>{
    const newSessions=sessions.map(s=>s.id===updated.id?updated:s);
    updateSessions(newSessions);db(SESS_KEY,newSessions);
    setEditingSession(null);notify("Allenamento modificato ✓");
  };

  const deleteSession=(id)=>{
    const newSessions=sessions.filter(s=>s.id!==id);
    updateSessions(newSessions);db(SESS_KEY,newSessions);
    notify("Allenamento eliminato","#ef4444");
  };

  const C=makeC(null,themePrefs.mode);const density=DENSITY_MODES[themePrefs.density]||DENSITY_MODES.normal;const S=makeS(C,density);
  const dayColorMap={};(program?.days||[]).forEach((d,i)=>{dayColorMap[d.name]=d.color||DAY_COLORS[i%DAY_COLORS.length];});

  const Toast=()=>toast?<div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",background:toast.col,color:"#fff",padding:"10px 20px",borderRadius:10,zIndex:9999,fontSize:12,letterSpacing:1,boxShadow:"0 4px 20px #0008",whiteSpace:"nowrap"}}>{toast.msg}</div>:null;
  const PRBanner=()=>newPR?<div className="pr-pop" style={{position:"fixed",top:"max(60px,env(safe-area-inset-top))",left:"50%",background:"linear-gradient(135deg,#f59e0b,#ef4444)",color:"#fff",padding:"10px 20px",borderRadius:12,zIndex:9998,textAlign:"center",boxShadow:"0 4px 24px #000a",minWidth:190}}><p style={{margin:0,fontSize:10,letterSpacing:2,opacity:0.85}}>🏆 NUOVO RECORD</p><p style={{margin:0,fontSize:17,fontWeight:900}}>{newPR.name}</p><p style={{margin:0,fontSize:13}}>{newPR.weight} kg</p></div>:null;

  const Header=({title,right})=>(
    <header style={S.hdr}>
      <h1 style={S.logo}>⚡ {title||"IRON LOG"}</h1>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        {right}
        <button onClick={toggleTheme} style={{background:"none",border:"none",fontSize:16,cursor:"pointer",padding:2}}>{(()=>{const m=themePrefs.mode||"dark_pure";return m.startsWith("light")?"🌙":"☀";})()}</button>
      </div>
    </header>
  );

  if(view==="loading")return(
    <div style={{...S.app,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
      <div style={{fontSize:42,marginBottom:12,animation:"pulse 1.5s infinite"}}>⚡</div>
      <p style={{color:"#ef4444",letterSpacing:8,fontSize:18,fontWeight:900,margin:"0 0 6px"}}>IRON LOG</p>
      <p style={{color:C.text3,letterSpacing:3,fontSize:9,margin:0}}>CARICAMENTO...</p>
    </div>
  );

  if(view==="finish"){
    return(<><PRBanner/><FinishPage C={C} S={S} workoutStart={workoutStart} program={program} activeDay={activeDay} logData={logData} sessionsRef={sessionsRef} onDone={handleFinish}/><TabBar view="finish" setView={setView} C={C}/></>);
  }

  if(view==="setup"||view==="setup-edit"){
    const isEdit=view==="setup-edit";
    return(
      <div style={S.app}><Toast/>
        <Header right={isEdit&&<button style={S.btn("ghost")} onClick={()=>setView("workout")}>← TORNA</button>}/>
        <div style={S.wrap}><SetupWizard S={S} C={C} initial={isEdit?program:null} onSave={saveProgram} onCancel={isEdit?()=>setView("workout"):null}/></div>
        <TabBar view="setup" setView={setView} C={C}/>
      </div>
    );
  }

  if(view==="log"&&activeDay!==null&&program){
    const day=program.days[activeDay];
    const dayCol=dayColorMap[day.name]||"#ef4444";
    const allScored=day.exercises.every(ex=>logData[ex.name]?.score);
    const prevRec=getRecords(sessionsRef.current);
    return(
      <div style={S.app}><Toast/><PRBanner/>
        <header style={{...S.hdr,borderBottomColor:dayCol}}>
          <div><h1 style={{...S.logo,color:dayCol}}>⚡ IRON LOG</h1><p style={{margin:0,fontSize:8,color:C.text3,letterSpacing:2}}>{day.name.toUpperCase()}</p></div>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            {workoutStart&&<WorkoutClock startTime={workoutStart} C={C}/>}
            <button onClick={toggleTheme} style={{background:"none",border:"none",fontSize:14,cursor:"pointer",padding:2}}>{(()=>{const m=themePrefs.mode||"dark_pure";return m.startsWith("light")?"🌙":"☀";})()}</button>
            <button style={S.btn("ghost")} onClick={()=>{setActiveDay(null);setWorkoutStart(null);setView("workout");}}>✕</button>
          </div>

                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                      <p style={{margin:0,fontSize:16,fontWeight:700,color:C.text}}>{ex.name}</p>
                      {isNewPR&&<span style={{fontSize:9,background:"#f59e0b",color:"#000",borderRadius:4,padding:"1px 5px",fontWeight:700}}>🏆 PR!</span>}
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                      <span style={S.tag(ex.muscle)}>{ex.muscle}</span>

                  </div>
                  <div style={{background:C.bg3,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 10px",textAlign:"right",flexShrink:0,minWidth:105}}>
                    {sg?(<>
                      <div style={{display:"flex",justifyContent:"flex-end",alignItems:"baseline",gap:3}}>
                        <span style={{fontSize:18,color:"#ef4444",fontWeight:900,lineHeight:1}}>{sg.nw}kg</span>
                        <span style={{fontSize:11,color:C.text3}}>×{sg.nr}</span>
                      </div>
                      <div style={{display:"inline-block",background:sg.badge+"22",borderRadius:4,padding:"2px 5px",margin:"2px 0"}}>

                    )}
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                  <div>
                    <label style={S.lbl}>Peso (kg)</label>
                    <input type="number" inputMode="decimal" min="0" step="0.5"
                      style={{...S.inp,fontSize:22,fontWeight:900,textAlign:"center",borderColor:isNewPR?"#f59e0b":C.border2}}
                      placeholder={sg?sg.nw:"0"} value={cur.weight??""}
                      onChange={e=>setLogData(d=>({...d,[ex.name]:{...d[ex.name],weight:e.target.value}}))}/>
                  </div>
                  <div>
                    <label style={S.lbl}>Ripetizioni</label>
                    <input type="number" inputMode="numeric" min="1" max="100"
                      style={{...S.inp,fontSize:22,fontWeight:900,textAlign:"center"}}
                      placeholder={sg?sg.nr:ex.minReps} value={cur.reps??""}
                      onChange={e=>setLogData(d=>({...d,[ex.name]:{...d[ex.name],reps:e.target.value}}))}/>

                </div>
                <div style={{marginBottom:8}}>

                </div>
                <input style={{...S.inp,fontSize:12,padding:"8px 10px"}} placeholder="Note esercizio..."
                  value={cur.note||""} onChange={e=>setLogData(d=>({...d,[ex.name]:{...d[ex.name],note:e.target.value}}))}/>
              </div>
            );
          })}
          <button style={{...S.btn(allScored?"red":"ghost"),width:"100%",padding:16,fontSize:13,letterSpacing:2,marginTop:4,
            background:allScored?"linear-gradient(135deg,#ef4444,#dc2626)":"transparent",
            boxShadow:allScored?"0 4px 20px #ef444450":"none",
            ...(allScored?{animation:"glow 2s infinite"}:{})
          }} onClick={allScored?()=>setView("finish"):undefined}>
            {allScored?"🏁 TERMINA ALLENAMENTO":"⚠ Inserisci difficoltà per ogni esercizio"}
          </button>
        </div>
        <TabBar view="log" setView={setView} C={C}/>
      </div>
    );
  }

  if(view==="history"){
    const allExNames=program?[...new Set(program.days.flatMap(d=>d.exercises.map(e=>e.name)))]:[];
    const records=getRecords(sessions);
    const streak=getStreak(sessions);
    const totMins=sessions.reduce((s,x)=>s+(x.duration||0),0);
    const totKcal=sessions.reduce((s,x)=>s+(x.kcal||0),0);
    const withDur=sessions.filter(s=>s.duration>0);
    const avgDur=withDur.length?Math.round(totMins/withDur.length):0;
    const weekGroups=groupByWeek(sessions);
    const thisWVol=(weekGroups[0]||[null,[]])[1].reduce((t,s)=>t+sessionVol(s),0);
    const lastWVol=(weekGroups[1]||[null,[]])[1].reduce((t,s)=>t+sessionVol(s),0);
    const wkDelta=lastWVol>0?Math.round((thisWVol-lastWVol)/lastWVol*100):null;

    const HistoryInner=()=>{
      const [htab,setHtab]=useState("grafici");
      const htabs=[["profilo","👤"],["analisi","🧬"],["grafici","📈"],["esercizi","🏋"],["log","📋"]];
      return(
        <div>
          {/* Stat pillole sempre visibili */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:10}}>
            {[["🔥 STREAK",`${streak}w`,"#ef4444"],["📊 SESSIONI",""+sessions.length,C.text],["🏆 PR",""+Object.keys(records).length,"#f59e0b"]].map(([l,v,col])=>(
              <div key={l} style={{...S.card,textAlign:"center",padding:"9px 4px",marginBottom:0}}><p style={{margin:"0 0 1px",fontSize:7,color:C.text3,letterSpacing:1}}>{l}</p><p style={{margin:0,fontSize:17,fontWeight:900,color:col}}>{v}</p></div>
            ))}
          </div>

          {/* Tab bar storico */}
          <div style={{display:"flex",gap:3,marginBottom:12,background:C.bg3,borderRadius:10,padding:4}}>
            {htabs.map(([k,icon])=>(
              <button key={k} onClick={()=>setHtab(k)} style={{flex:1,padding:"7px 2px",borderRadius:8,border:"none",background:htab===k?C.bg2:"transparent",color:htab===k?C.text:C.text3,fontSize:9,fontWeight:htab===k?700:400,cursor:"pointer",fontFamily:"inherit",letterSpacing:0.3,transition:"all 0.15s"}}>
                {icon} {k.toUpperCase()}

            ))}
          </div>

          {/* ── PROFILO ── */}
          {htab==="profilo"&&(
            <div className="fade-up">
              <XPLevelCard sessions={sessions} C={C} S={S}/>
              <BadgeWall sessions={sessions} records={records} C={C} S={S}/>
            </div>
          )}


          {/* ── ANALISI AVANZATA ── */}
          {htab==="analisi"&&(
            <AnalisiPanel sessions={sessions} bwEntries={bwEntries} actEntries={actEntries}
              nutrEntries={nutrEntries} tdeeEntries={tdeeEntries} records={records} themePrefs={themePrefs} setThemePrefs={setThemePrefs} C={C} S={S}/>
          )}

          {/* ── GRAFICI ── */}
          {htab==="grafici"&&(
            <div className="fade-up">
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:10}}>
                {[["⏱ TEMPO",fmtDur(totMins)],["🔥 KCAL",totKcal?totKcal.toLocaleString():"—"],["⌀ DURATA",fmtDur(avgDur)]].map(([l,v])=>(
                  <div key={l} style={{...S.card,textAlign:"center",padding:"9px 4px",marginBottom:0}}><p style={{margin:"0 0 1px",fontSize:7,color:C.text3,letterSpacing:1}}>{l}</p><p style={{margin:0,fontSize:12,fontWeight:900,color:C.text}}>{v}</p></div>
                ))}
              </div>
              {wkDelta!==null&&<div style={{...S.card,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <p style={{margin:0,fontSize:10,color:C.text2}}>Volume sett. corrente vs scorsa</p>
                <span style={{fontSize:20,fontWeight:900,color:wkDelta>=0?"#10b981":"#ef4444"}}>{wkDelta>=0?"+":""}{wkDelta}%</span>
              </div>}
              <div style={S.card}><WeekCalendar sessions={sessions} program={program} actEntries={actEntries} C={C} offset={calOffset} setOffset={setCalOffset}/></div>
              {sessions.length>=2&&<div style={S.card}><VolumeChart sessions={sessions} C={C}/></div>}
              {sessions.length>=4&&<div style={S.card}><MuscleVolumeMatrix sessions={sessions} C={C}/></div>}
              {sessions.length>=4&&<div style={S.card}><ConsistencyBar sessions={sessions} C={C}/></div>}
              {sessions.length>=3&&<div style={S.card}><MuscleChart sessions={sessions} C={C}/></div>}
              {sessions.length>=4&&<div style={S.card}><RadarChart sessions={sessions} C={C}/></div>}
              {sessions.length>=7&&<div style={S.card}><HeatmapChart sessions={sessions} actEntries={actEntries} C={C}/></div>}
            </div>
          )}

          {/* ── ESERCIZI ── */}
          {htab==="esercizi"&&(
            <div className="fade-up">
              <PRHallOfFame sessions={sessions} program={program} C={C} S={S}/>
              <h2 style={{...S.h2,marginTop:12}}>PROGRESSIONE</h2>
              {allExNames.length===0&&<p style={{color:C.text4,textAlign:"center",fontSize:12,padding:"20px 0"}}>Nessuna sessione ancora</p>}
              {allExNames.map(name=><ExerciseRow key={name} name={name} sessions={sessions} goal={goals[name]} onGoalChange={setGoal} records={records} C={C} S={S}/>)}
            </div>
          )}

          {/* ── LOG ── */}
          {htab==="log"&&(
            <div className="fade-up">
              {/* Export */}
              <div style={{...S.card,marginBottom:10}}>
                <p style={{fontSize:9,letterSpacing:2,color:C.text3,margin:"0 0 12px"}}>📦 ESPORTA & IMPORTA</p>
                <p style={{fontSize:8,letterSpacing:2,color:C.text3,margin:"0 0 6px"}}>BACKUP COMPLETO</p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                  <button style={{...S.btn("red"),padding:"11px 8px",fontSize:10}} onClick={exportAllJSON}>⬇ JSON Backup</button>
                  <label style={{padding:"11px 8px",fontSize:10,textAlign:"center",cursor:"pointer",display:"block",borderRadius:8,border:`1px solid ${C.border2}`,color:C.text3,fontFamily:"inherit"}}>
                    ⬆ Importa JSON<input type="file" accept=".json" onChange={importJSON} style={{display:"none"}}/>

                  {[["🏋 Allenamenti",exportSessionsCSV,sessions.length>0],["⚖ Corpo",exportBodyCSV,bwEntries.length>0],["🍎 Nutrizione",exportNutrCSV,Object.keys(nutrEntries).length>0],["🔥 Bilancio",exportCalCSV,Object.keys(tdeeEntries).length>0||Object.keys(nutrEntries).length>0],["🏃 Attività",exportActivitiesCSV,Object.keys(actEntries).length>0]].map(([label,fn,hasData])=>(
                    <button key={label} onClick={fn} disabled={!hasData} style={{padding:"9px 6px",fontSize:10,borderRadius:8,border:`1px solid ${C.border2}`,background:"transparent",color:hasData?C.text2:C.text4,cursor:hasData?"pointer":"default",opacity:hasData?1:0.35,fontFamily:"inherit",textAlign:"left"}}>{label}</button>

            </div>
          )}
        </div>
      );
    };

    return(
      <div style={S.app}><Toast/>
        {editingSession&&<SessionEditModal session={editingSession} onSave={saveEditedSession} onClose={()=>setEditingSession(null)} C={C} S={S}/>}
        <Header/>
        <div style={S.wrap}><HistoryInner/></div>
        <TabBar view="history" setView={setView} C={C}/>
      </div>
    );
  }

  if(view==="fisico"){
    return(
      <div style={S.app}><Toast/>
        <Header title="FISICO"/>
        <FisicoScreen C={C} S={S}
          bwEntries={bwEntries} setBwEntries={(v)=>{setBwEntries(v);db(BW_KEY,v);}}
          nutrEntries={nutrEntries} setNutrEntries={(v)=>{setNutrEntries(v);db(NUTR_KEY,v);}}
          actEntries={actEntries} setActEntries={(v)=>{setActEntries(v);db(ACT_KEY,v);}}
          tdeeEntries={tdeeEntries} setTdeeEntries={(v)=>{setTdeeEntries(v);db(TDEE_KEY,v);}}
        />
        <TabBar view="fisico" setView={setView} C={C}/>
      </div>
    );
  }

  // ── WORKOUT DASHBOARD ──
  const streak=getStreak(sessions);
  const records=getRecords(sessions);
  const lastSess=sessions.length?sessions[sessions.length-1]:null;

  const WorkoutInner=()=>{
    const [wtab,setWtab]=useState("oggi");
    return(
      <div>
        <div style={{display:"flex",gap:4,marginBottom:12,background:C.bg3,borderRadius:10,padding:4}}>
          {[["oggi","📅 OGGI"],["programma","🏋 PROGRAMMA"]].map(([k,label])=>(
            <button key={k} onClick={()=>setWtab(k)} style={{flex:1,padding:"9px 4px",borderRadius:8,border:"none",background:wtab===k?C.bg2:"transparent",color:wtab===k?C.text:C.text3,fontSize:11,fontWeight:wtab===k?700:400,cursor:"pointer",fontFamily:"inherit",letterSpacing:1,transition:"all 0.15s"}}>
              {label}
            </button>
          ))}
        </div>

        {wtab==="oggi"&&(
          <div className="fade-up">
            {/* Quote card con gradient */}
            <div style={{...S.card,borderLeft:"3px solid #ef4444",marginBottom:10,background:`linear-gradient(135deg,${C.bg2},${C.bg3})`,position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",right:-10,top:-10,fontSize:60,opacity:0.06,lineHeight:1,userSelect:"none"}}>💬</div>
              <p style={{margin:"0 0 6px",fontSize:8,letterSpacing:2,color:"#ef4444"}}>MOTIVAZIONE DEL GIORNO</p>
              <p style={{margin:0,fontSize:13,color:C.text,fontStyle:"italic",lineHeight:1.6,fontWeight:500}}>"{QUOTES[new Date().getDay()%QUOTES.length]}"</p>
            </div>

            {/* Streak prominente se > 1 */}
            {streak>=2&&(
              <div style={{...S.card,marginBottom:10,background:"linear-gradient(135deg,#ef444415,#f59e0b08)",borderLeft:"3px solid #ef4444",display:"flex",alignItems:"center",gap:12}}>
                <div style={{fontSize:32,lineHeight:1,filter:"drop-shadow(0 2px 8px #ef444480)"}}>🔥</div>
                <div style={{flex:1}}>
                  <p style={{margin:"0 0 1px",fontSize:8,letterSpacing:2,color:"#ef4444"}}>STREAK SETTIMANALE</p>
                  <p style={{margin:0,fontSize:22,fontWeight:900,color:C.text,lineHeight:1}}>{streak} <span style={{fontSize:12,fontWeight:400,color:C.text3}}>settimane di fila</span></p>
                </div>
                <div style={{fontSize:24}}>{streak>=8?"🏆":streak>=4?"⚡":"💪"}</div>
              </div>
            )}

            <TodaySnapshot sessions={sessions} nutrEntries={nutrEntries} tdeeEntries={tdeeEntries} actEntries={actEntries} program={program} C={C} S={S}/>
            <WeekSummary sessions={sessions} setSessions={(v)=>{updateSessions(v);db(SESS_KEY,v);}} nutrEntries={nutrEntries} setNutrEntries={(v)=>{setNutrEntries(v);db(NUTR_KEY,v);}} actEntries={actEntries} setActEntries={(v)=>{setActEntries(v);db(ACT_KEY,v);}} tdeeEntries={tdeeEntries} setTdeeEntries={(v)=>{setTdeeEntries(v);db(TDEE_KEY,v);}} program={program} C={C} S={S}/>
            {(()=>{const xp=calcXP(sessions);const lv=getLevel(xp);const pct=getLevelProgress(xp);const unlockedCount=getUnlockedBadges(sessions,records).length;return(
              <div style={{...S.card,marginTop:10,display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderLeft:`3px solid ${lv.color}`,background:`linear-gradient(135deg,${C.bg2},${C.bg3})`}}>
                <span style={{fontSize:26}}>{lv.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
                    <span style={{fontSize:12,fontWeight:900,color:lv.color,letterSpacing:1}}>{lv.name}</span>
                    <span style={{fontSize:9,color:C.text4}}>{xp.toLocaleString()} XP</span>
                  </div>
                  <div style={{height:5,borderRadius:3,background:C.bg4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct*100}%`,background:lv.color,borderRadius:3,transition:"width 1s",boxShadow:`0 0 6px ${lv.color}80`}}/>
                  </div>
                </div>
                <div style={{textAlign:"center",flexShrink:0}}>
                  <p style={{margin:"0 0 1px",fontSize:8,color:C.text4}}>BADGE</p>
                  <p style={{margin:0,fontSize:14,fontWeight:900,color:"#f59e0b"}}>{unlockedCount}/{BADGES.length}</p>
                </div>
              </div>
            );})()} 
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginTop:10}}>
              {[["🔥 STREAK",`${streak}w`,"#ef4444"],["📊 SESSIONI",""+sessions.length,C.text],["🏆 PR",""+Object.keys(records).length,"#f59e0b"]].map(([l,v,col])=>(
                <div key={l} style={{...S.card,textAlign:"center",padding:"10px 6px",marginBottom:0}}><p style={{margin:"0 0 2px",fontSize:8,color:C.text3,letterSpacing:1}}>{l}</p><p style={{margin:0,fontSize:16,fontWeight:900,color:col}}>{v}</p></div>
              ))}
            </div>
            <div style={{...S.card,padding:"10px 14px",marginTop:10}}><HydrationTracker C={C}/></div>
            {lastSess&&(
              <div style={{...S.card,padding:"10px 14px",marginTop:10,borderLeft:`3px solid ${dayColorMap[lastSess.dayName]||"#ef4444"}`}}>
                <p style={{margin:"0 0 4px",fontSize:8,color:C.text3,letterSpacing:2}}>ULTIMO ALLENAMENTO</p>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><p style={{margin:0,fontSize:13,fontWeight:700,color:C.text}}>{lastSess.dayName}</p><p style={{margin:0,fontSize:9,color:C.text3}}>{lastSess.date}</p></div>
                  <div style={{textAlign:"right"}}>
                    {lastSess.duration>0&&<p style={{margin:0,fontSize:10,color:C.text2}}>⏱ {fmtDur(lastSess.duration)}</p>}
                    {lastSess.kcal>0&&<p style={{margin:0,fontSize:10,color:"#f97316"}}>🔥 {lastSess.kcal} kcal</p>}
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {wtab==="programma"&&(
          <div className="fade-up">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <h2 style={{...S.h2,marginBottom:0}}>IL MIO PROGRAMMA</h2>
              <button style={{...S.btn("ghost"),padding:"7px 12px",fontSize:9}} onClick={()=>setView("setup-edit")}>✏ MODIFICA</button>
            </div>
            {program?.days.map((day,di)=>{
              const muscles=[...new Set(day.exercises.map(e=>e.muscle))];
              const dayCol=dayColorMap[day.name]||"#ef4444";
              // conta quante sessioni di questo giorno esistono
              const daySessions=sessions.filter(s=>s.dayName===day.name);
              const lastDS=daySessions.length?daySessions[daySessions.length-1]:null;
              return(
                <div key={di} style={{...S.card,borderTop:`3px solid ${dayCol}`,marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                        <div style={{width:10,height:10,borderRadius:"50%",background:dayCol,boxShadow:`0 0 8px ${dayCol}80`}}/>
                        <p style={{margin:0,fontSize:16,letterSpacing:1,fontWeight:700,color:C.text}}>{day.name}</p>
                        {daySessions.length>0&&<span style={{fontSize:8,color:C.text4,letterSpacing:1}}>{daySessions.length}×</span>}
                      </div>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{muscles.map(m=><span key={m} style={S.tag(m)}>{m}</span>)}</div>
                      {lastDS&&<p style={{margin:"4px 0 0",fontSize:8,color:C.text4}}>Ultima volta: {lastDS.date}</p>}
                    </div>
                    <button style={{...S.btn("red"),padding:"12px 16px",fontSize:12,background:dayCol,boxShadow:`0 4px 16px ${dayCol}60`,letterSpacing:2}} onClick={()=>startWorkout(di)}>▶ INIZIA</button>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {day.exercises.map((ex,ei)=>{
                      const sg=getSuggestion(ex.name,ex.minReps,ex.maxReps,ex.step,sessions);
                      return(
                        <div key={ei} style={{background:C.bg3,borderRadius:7,padding:"7px 9px",minWidth:92,borderLeft:`2px solid ${MUSCLE_COLORS[ex.muscle]||dayCol}44`}}>
                          <p style={{margin:"0 0 1px",fontSize:10,color:C.text2}}>{ex.name}</p>
                          <p style={{margin:"0 0 1px",fontSize:8,color:C.text4}}>{ex.sets}×{ex.minReps}–{ex.maxReps}</p>
                          {sg?<p style={{margin:0,fontSize:12,color:dayCol,fontWeight:900}}>{sg.nw}kg×{sg.nr}</p>:<p style={{margin:0,fontSize:9,color:C.text4}}>Prima volta</p>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  };

  return(
    <div style={S.app}><Toast/><PRBanner/>
      <Header/>
      <div style={S.wrap}><WorkoutInner/></div>
      <TabBar view="workout" setView={setView} C={C}/>
    </div>
  );
}

// ── SETUP WIZARD ──
function SetupWizard({S,C,initial,onSave,onCancel}){
  const [days,setDays]=useState(initial?.days??[]);
  const [editingDay,setEditingDay]=useState(null);
  const [newName,setNewName]=useState("");
  const [tempEx,setTempEx]=useState([]);
  const [muscle,setMuscle]=useState(MUSCLE_GROUPS[0]);
  const [search,setSearch]=useState("");
  const [sets,setSets]=useState(4);
  const [minR,setMinR]=useState(8);
  const [maxR,setMaxR]=useState(12);
  const [step,setStep]=useState(2.5);

  const [dayColor,setDayColor]=useState(DAY_COLORS[0]);
  const startEdit=(i)=>{setTempEx([...days[i].exercises]);setDayColor(days[i].color||DAY_COLORS[i%DAY_COLORS.length]);setEditingDay({name:days[i].name,isNew:false,idx:i,color:days[i].color||DAY_COLORS[i%DAY_COLORS.length]});};
  const [newColor,setNewColor]=useState(()=>DAY_COLORS[0]);
  const startNew=()=>{if(!newName.trim())return;const col=DAY_COLORS[days.length%DAY_COLORS.length];setDayColor(col);setTempEx([]);setEditingDay({name:newName.trim(),isNew:true,idx:days.length,color:col});setNewName("");};
  const addEx=(n)=>{if(tempEx.find(e=>e.name===n))return;setTempEx(t=>[...t,{muscle,name:n,sets,minReps:minR,maxReps:maxR,step}]);};
  const saveDay=()=>{const d={name:editingDay.name,color:dayColor,exercises:tempEx};setDays(ds=>editingDay.isNew?[...ds,d]:ds.map((x,i)=>i===editingDay.idx?d:x));setEditingDay(null);};
  const suggs=(DEFAULT_EX[muscle]||[]).filter(e=>e.toLowerCase().includes(search.toLowerCase())&&!tempEx.find(t=>t.name===e));

  if(editingDay)return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <h2 style={{...S.h2,marginBottom:0,borderLeftColor:dayColor}}>{editingDay.name}</h2>
        <button style={S.btn("ghost")} onClick={()=>setEditingDay(null)}>← TORNA</button>
      </div>
      <div style={{...S.card,padding:"10px 14px",marginBottom:10}}>
        <label style={S.lbl}>🎨 Colore del giorno</label>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>
          {DAY_COLORS.map(col=>(
            <button key={col} onClick={()=>setDayColor(col)} style={{width:32,height:32,borderRadius:"50%",background:col,border:dayColor===col?"3px solid #fff":"3px solid transparent",cursor:"pointer",boxShadow:dayColor===col?"0 0 0 2px "+col:"none",transition:"all 0.15s"}}/>
          ))}
        </div>
      </div>
      <div style={S.card}>
        <label style={S.lbl}>Gruppo muscolare</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
          {MUSCLE_GROUPS.map(m=><button key={m} onClick={()=>setMuscle(m)} style={{padding:"7px 11px",borderRadius:6,cursor:"pointer",fontSize:11,fontFamily:"inherit",border:`2px solid ${muscle===m?MUSCLE_COLORS[m]:C.border2}`,background:muscle===m?MUSCLE_COLORS[m]+"18":"transparent",color:muscle===m?MUSCLE_COLORS[m]:C.text3}}>{m}</button>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginBottom:8}}>
          <div><label style={S.lbl}>Serie</label><input type="number" inputMode="numeric" min="1" max="10" style={S.inp} value={sets} onChange={e=>setSets(+e.target.value)}/></div>
          <div><label style={S.lbl}>Min rip.</label><input type="number" inputMode="numeric" min="1" max="30" style={S.inp} value={minR} onChange={e=>setMinR(+e.target.value)}/></div>
          <div><label style={S.lbl}>Max rip.</label><input type="number" inputMode="numeric" min="1" max="50" style={S.inp} value={maxR} onChange={e=>setMaxR(+e.target.value)}/></div>
          <div><label style={S.lbl}>Scalino</label>
            <select style={{...S.inp,padding:"11px 8px"}} value={step} onChange={e=>setStep(+e.target.value)}>
              {[0.5,1,1.25,2,2.5,5,10,15,20].map(v=><option key={v} value={v}>{v}kg</option>)}
            </select>
          </div>
        </div>
        <label style={S.lbl}>Cerca / Aggiungi</label>
        <input style={{...S.inp,marginBottom:8}} placeholder="Nome esercizio..." value={search} onChange={e=>setSearch(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&search.trim()){addEx(search.trim());setSearch("");}}}/>
        {suggs.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>{suggs.slice(0,9).map(s=><button key={s} onClick={()=>{addEx(s);setSearch("");}} style={{padding:"7px 9px",borderRadius:6,border:`1px solid ${C.border}`,background:C.bg3,color:C.text2,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>+ {s}</button>)}</div>}
        {search.trim()&&!(DEFAULT_EX[muscle]||[]).includes(search.trim())&&<button onClick={()=>{addEx(search.trim());setSearch("");}} style={{...S.btn("red"),fontSize:11,marginBottom:8}}>+ "{search.trim()}"</button>}
      </div>
      <p style={{fontSize:8,letterSpacing:2,color:C.text4,margin:"0 0 8px"}}>ESERCIZI ({tempEx.length})</p>
      {tempEx.map((ex,i)=>(
        <div key={i} style={{...S.card,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}><span style={S.tag(ex.muscle)}>{ex.muscle}</span><span style={{fontSize:13,fontWeight:600,color:C.text}}>{ex.name}</span></div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{fontSize:9,color:C.text4}}>{ex.sets}×{ex.minReps}–{ex.maxReps}·+{ex.step||2.5}kg</span><button onClick={()=>setTempEx(t=>t.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:18,padding:"0 4px"}}>✕</button></div>
        </div>
      ))}
      <button style={{...S.btn(tempEx.length?"red":"ghost"),width:"100%",padding:14,fontSize:13,letterSpacing:2,marginTop:4}} onClick={tempEx.length?saveDay:undefined} disabled={!tempEx.length}>✓ SALVA GIORNO</button>
    </div>
  );
  return(
    <div>
      <h2 style={S.h2}>{initial?"MODIFICA PROGRAMMA":"CREA IL TUO PROGRAMMA"}</h2>
      <p style={{fontSize:9,color:C.text3,margin:"0 0 12px"}}>Modifica ogni giorno per scegliere il colore che apparirà nel calendario.</p>
      {days.map((d,i)=>(
        <div key={i} style={{...S.card,display:"flex",justifyContent:"space-between",alignItems:"center",borderLeft:`3px solid ${d.color||DAY_COLORS[i%DAY_COLORS.length]}`}}>
          <div><p style={{margin:"0 0 4px",fontSize:14,fontWeight:700,color:C.text}}>{d.name}</p><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{[...new Set(d.exercises.map(e=>e.muscle))].map(m=><span key={m} style={S.tag(m)}>{m}</span>)}</div></div>
          <div style={{display:"flex",gap:6}}>
            <button style={{...S.btn("ghost"),padding:"7px 10px",fontSize:9}} onClick={()=>startEdit(i)}>✏</button>
            <button style={{background:"none",border:"none",color:C.text3,cursor:"pointer",fontSize:18,padding:"0 4px"}} onClick={()=>setDays(ds=>ds.filter((_,j)=>j!==i))}>✕</button>
          </div>
        </div>
      ))}
      <div style={{...S.card,border:`1px dashed ${C.border}`}}>
        <label style={S.lbl}>Nome nuovo giorno</label>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{width:14,height:14,borderRadius:"50%",background:DAY_COLORS[days.length%DAY_COLORS.length],flexShrink:0}}/>
          <input style={{...S.inp,flex:1}} placeholder="Es. Push Day, Lunedì..." value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&startNew()}/>
          <button style={{...S.btn("red"),whiteSpace:"nowrap"}} onClick={startNew}>+</button>
        </div>
      </div>
      <button style={{...S.btn(days.length?"red":"ghost"),width:"100%",padding:14,fontSize:13,letterSpacing:2,marginTop:4}} onClick={days.length?()=>onSave({days}):undefined} disabled={!days.length}>{initial?"💾 AGGIORNA":"🚀 INIZIA A TRAINARE"}</button>
      {onCancel&&<button style={{...S.btn("ghost"),width:"100%",padding:12,marginTop:8}} onClick={onCancel}>Annulla</button>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<GymTracker/>);
</script>
</body>
</html>
